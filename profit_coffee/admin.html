<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="robots" content="noindex, nofollow">
  <title>PROFIT Coffee · Кабінет менеджера</title>
  <meta name="theme-color" content="#2a0f00">
  <link rel="icon" type="image/png" href="../profit/assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --sans:   'DM Sans', sans-serif;
      --head:   'Montserrat', sans-serif;
      --brown:  #2a0f00;  --brown2: #3d1c02;  --brown3: #5c2a08;
      --gold:   #c9a84c;  --gold2:  #e8c96e;  --amber:  #d4941f;
      --cream:  #fdf6e8;  --cream2: #f5e6c8;
      --text:   #2a0f00;  --muted:  #7a5f3a;
      --disc:   #c0392b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-overflow-scrolling: touch; }
    body {
      font-family: var(--sans); background: var(--brown); color: var(--text);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
    }
    a { -webkit-tap-highlight-color: transparent; }
    button { -webkit-tap-highlight-color: transparent; }

    /* ══ LOGIN GATE ══ */
    .gate-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, var(--brown) 0%, #1a0700 100%);
      position: relative; overflow: hidden;
    }
    .gate-wrap::before {
      content: ''; position: absolute; top: -120px; right: -120px;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,.1), transparent 65%);
      pointer-events: none;
    }
    .gate-wrap::after {
      content: ''; position: absolute; bottom: -100px; left: -100px;
      width: 350px; height: 350px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,148,31,.08), transparent 65%);
      pointer-events: none;
    }
    .gate-card {
      background: var(--cream); border-radius: 24px; padding: 3rem 2.5rem;
      max-width: 400px; width: 100%; text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(201,168,76,.1);
      position: relative; z-index: 1;
    }
    .gate-logo { width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 1rem; display: block; object-fit: cover; }
    .gate-brand { font-family: var(--head); font-weight: 900; font-size: .75rem; letter-spacing: .18em; color: var(--brown); margin-bottom: .25rem; }
    .gate-ico { font-size: 2.5rem; margin-bottom: 1rem; }
    .gate-h { font-family: var(--head); font-weight: 900; font-size: 1.125rem; color: var(--brown); letter-spacing: .04em; margin-bottom: .5rem; }
    .gate-sub { font-size: .8125rem; color: var(--muted); margin-bottom: 2rem; }
    .gate-inp {
      width: 100%; font-family: var(--sans); font-size: 1rem; color: var(--text);
      background: #fff; border: 1.5px solid var(--cream2); border-radius: 12px;
      padding: .9375rem 1.125rem; outline: none; text-align: center; letter-spacing: .1em;
      transition: border-color .2s, box-shadow .2s; margin-bottom: 1rem;
    }
    .gate-inp:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,.15); }
    .gate-btn {
      font-family: var(--head); font-weight: 800; font-size: .75rem; letter-spacing: .1em;
      background: var(--brown); color: var(--gold2); border: none;
      padding: 1rem 2.25rem; border-radius: 12px; cursor: pointer; width: 100%;
      transition: background .15s, transform .15s, box-shadow .15s;
      box-shadow: 0 4px 16px rgba(42,15,0,.25);
    }
    .gate-btn:hover { background: var(--brown2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(42,15,0,.35); }
    .gate-btn:active { transform: scale(.98); }
    .gate-err { font-family: var(--head); font-size: .6875rem; font-weight: 600; color: var(--disc); min-height: 1.5rem; margin-top: .75rem; }
    .gate-back {
      font-family: var(--head); font-size: .6875rem; font-weight: 600; color: var(--muted);
      background: none; border: none; cursor: pointer; margin-top: 1.25rem;
      text-decoration: underline; text-underline-offset: 2px;
      transition: color .15s;
    }
    .gate-back:hover { color: var(--brown); }
    .gate-demo {
      font-family: var(--head); font-size: .625rem; font-weight: 700; letter-spacing: .06em;
      color: var(--amber); background: rgba(212,148,31,.1); border: 1px solid rgba(212,148,31,.2);
      padding: .6rem 1.25rem; border-radius: 100px; cursor: pointer;
      margin-top: 1.25rem; transition: background .15s, transform .15s;
    }
    .gate-demo:hover { background: rgba(212,148,31,.18); transform: translateY(-1px); }

    /* ══ DASHBOARD ══ */
    .dash { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
    .dash.open { display: flex; }

    /* Top bar */
    .top {
      background: var(--brown2); padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
      border-bottom: 1px solid rgba(201,168,76,.12);
      position: -webkit-sticky; position: sticky; top: 0; z-index: 10;
    }
    .top-left { display: flex; align-items: center; gap: .75rem; }
    .top-logo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    .top-ttl { font-family: var(--head); font-weight: 800; font-size: .9375rem; color: var(--gold2); letter-spacing: .06em; }
    .top-sub { font-family: var(--head); font-size: .5rem; letter-spacing: .12em; color: rgba(255,255,255,.3); }
    .top-btns { display: flex; gap: .375rem; flex-wrap: wrap; }
    .tb {
      font-family: var(--head); font-size: .625rem; font-weight: 700; letter-spacing: .06em;
      border: none; cursor: pointer; padding: .5rem 1rem; border-radius: 100px;
      transition: opacity .15s, transform .15s;
      display: inline-flex; align-items: center; gap: .375rem;
    }
    .tb:hover { opacity: .85; transform: translateY(-1px); }
    .tb:active { transform: scale(.97); }
    .tb-g { background: rgba(201,168,76,.15); color: var(--gold2); border: 1px solid rgba(201,168,76,.2); }
    .tb-r { background: rgba(192,57,43,.18); color: #e74c3c; border: 1px solid rgba(192,57,43,.25); }
    .tb-x { background: rgba(255,255,255,.08); color: rgba(255,255,255,.6); }

    /* Content area */
    .content { flex: 1; overflow-y: auto; padding: 1.5rem; -webkit-overflow-scrolling: touch; }

    /* KPI cards */
    .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.75rem; }
    .kpi {
      background: rgba(255,255,255,.05); border: 1px solid rgba(201,168,76,.15);
      border-radius: 16px; padding: 1.25rem 1rem; text-align: center;
      transition: border-color .2s, box-shadow .2s;
    }
    .kpi:hover { border-color: rgba(201,168,76,.3); box-shadow: 0 4px 20px rgba(201,168,76,.08); }
    .kpi-v { font-family: var(--head); font-weight: 900; font-size: 1.75rem; color: var(--gold2); line-height: 1.1; }
    .kpi-l { font-family: var(--head); font-size: .5625rem; letter-spacing: .1em; color: rgba(255,255,255,.4); margin-top: .375rem; text-transform: uppercase; }

    /* Toolbar */
    .tools { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tools label { font-family: var(--head); font-size: .625rem; font-weight: 700; letter-spacing: .1em; color: rgba(255,255,255,.45); }
    .tools input[type=date] {
      font-family: var(--head); font-size: .75rem;
      background: rgba(255,255,255,.06); border: 1px solid rgba(201,168,76,.2);
      color: var(--gold2); border-radius: 10px; padding: .5rem .875rem;
      outline: none; cursor: pointer; transition: border-color .2s;
    }
    .tools input[type=date]:focus { border-color: var(--gold); }
    .tools-cnt { font-family: var(--head); font-size: .625rem; color: rgba(255,255,255,.45); }
    .tools-search {
      font-family: var(--sans); font-size: .8125rem;
      background: rgba(255,255,255,.06); border: 1px solid rgba(201,168,76,.15);
      color: #fff; border-radius: 10px; padding: .5rem .875rem;
      outline: none; flex: 1; min-width: 160px; max-width: 280px;
      transition: border-color .2s;
    }
    .tools-search::placeholder { color: rgba(255,255,255,.25); }
    .tools-search:focus { border-color: var(--gold); }

    /* Table */
    .tbl-w { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 12px; border: 1px solid rgba(201,168,76,.1); }
    .tbl { width: 100%; border-collapse: collapse; font-size: .8125rem; }
    .tbl thead th {
      font-family: var(--head); font-size: .5625rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--gold); padding: .75rem 1rem; text-align: left;
      border-bottom: 1px solid rgba(201,168,76,.15); white-space: nowrap;
      background: rgba(255,255,255,.02);
    }
    .tbl tbody td {
      padding: .875rem 1rem; border-bottom: 1px solid rgba(255,255,255,.04);
      color: rgba(255,255,255,.75); vertical-align: top;
    }
    .tbl tbody tr { transition: background .15s; }
    .tbl tbody tr:hover td { background: rgba(255,255,255,.04); }
    .tbl tbody tr:last-child td { border-bottom: none; }
    .cell-id { color: rgba(255,255,255,.3); font-family: var(--head); font-size: .75rem; }
    .cell-dt { color: rgba(255,255,255,.4); font-family: var(--head); font-size: .75rem; white-space: nowrap; }
    .cell-name { font-family: var(--head); font-weight: 700; color: #fff; }
    .cell-phone { white-space: nowrap; }
    .cell-prod { font-size: .75rem; }
    .cell-price { color: var(--gold); font-family: var(--head); font-weight: 700; }
    .cell-note { font-size: .75rem; color: rgba(255,255,255,.4); }
    .tbl-empty { text-align: center; padding: 3rem; font-family: var(--head); font-size: .8125rem; color: rgba(255,255,255,.25); }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 1024px) {
      .kpis { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .top { padding: .875rem 1.125rem; }
      .top-ttl { font-size: .8125rem; }
      .top-btns { width: 100%; }
      .tb { flex: 1; justify-content: center; font-size: .5625rem; padding: .45rem .625rem; }
      .content { padding: 1.125rem; }
      .kpis { grid-template-columns: repeat(2, 1fr); gap: .75rem; }
      .kpi { padding: 1rem .75rem; border-radius: 12px; }
      .kpi-v { font-size: 1.375rem; }
      .kpi-l { font-size: .5rem; }
      .tools { gap: .625rem; }
      .tools-search { max-width: none; min-width: 0; }
      .tbl { font-size: .75rem; }
      .tbl thead th { font-size: .5rem; padding: .625rem .625rem; }
      .tbl tbody td { padding: .625rem .625rem; }
      .gate-card { padding: 2.5rem 2rem; }
    }
    @media (max-width: 480px) {
      .top { padding: .75rem 1rem; }
      .top-left { gap: .5rem; }
      .top-logo { width: 28px; height: 28px; }
      .top-ttl { font-size: .75rem; }
      .top-sub { display: none; }
      .top-btns { gap: .25rem; }
      .tb { font-size: .5rem; padding: .4rem .5rem; }
      .content { padding: .875rem; }
      .kpis { gap: .5rem; }
      .kpi { padding: .75rem .5rem; }
      .kpi-v { font-size: 1.125rem; }
      .kpi-l { font-size: .4375rem; }
      .tools { flex-direction: column; align-items: stretch; gap: .5rem; }
      .tools label { font-size: .5625rem; }
      .tools input[type=date] { font-size: .6875rem; }
      .tools-search { max-width: none; }
      .tbl thead th { font-size: .4375rem; padding: .5rem .4rem; letter-spacing: .06em; }
      .tbl tbody td { padding: .5rem .4rem; font-size: .6875rem; }
      .gate-card { padding: 2rem 1.5rem; border-radius: 18px; margin: 0 .5rem; }
      .gate-h { font-size: 1rem; }
      .gate-sub { font-size: .75rem; }
      .gate-inp { font-size: .9375rem; padding: .8125rem 1rem; }
    }
    @media (max-width: 360px) {
      .kpis { grid-template-columns: 1fr 1fr; gap: .375rem; }
      .kpi-v { font-size: 1rem; }
      .kpi-l { font-size: .375rem; }
      .tb { font-size: .4375rem; letter-spacing: .03em; }
    }

    /* iOS Safari fix */
    @supports (-webkit-touch-callout: none) {
      .dash { height: -webkit-fill-available; }
      .gate-wrap { min-height: -webkit-fill-available; }
    }
    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<!-- LOGIN GATE -->
<div class="gate-wrap" id="gateWrap">
  <div class="gate-card">
    <img src="../profit/assets/logo.png" alt="PROFIT" class="gate-logo">
    <div class="gate-brand">PROFIT COFFEE</div>
    <div class="gate-ico">🔐</div>
    <div class="gate-h">Кабінет менеджера</div>
    <div class="gate-sub">Введіть пароль для доступу до панелі замовлень</div>
    <input class="gate-inp" type="password" id="pwd" placeholder="Пароль" autocomplete="off" onkeydown="if(event.key==='Enter')login()">
    <button class="gate-btn" onclick="login()">УВІЙТИ</button>
    <div class="gate-err" id="err"></div>
    <button class="gate-demo" onclick="openDemo()">☕ ВІДКРИТИ ДЕМО-РЕЖИМ</button>
    <br>
    <a href="index.html" class="gate-back">← Повернутися на сайт</a>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">
  <div class="top">
    <div class="top-left">
      <img src="../profit/assets/logo.png" alt="PROFIT" class="top-logo">
      <div>
        <div class="top-ttl">☕ PROFIT · Менеджер замовлень</div>
        <div class="top-sub">КАБІНЕТ МЕНЕДЖЕРА</div>
      </div>
    </div>
    <div class="top-btns">
      <button class="tb tb-g" onclick="showToday()">📅 Сьогодні</button>
      <button class="tb tb-g" onclick="showAll()">📋 Усі</button>
      <button class="tb tb-g" onclick="printR()">🖨 Звіт</button>
      <button class="tb tb-r" onclick="wipe()">🗑 Очистити</button>
      <button class="tb tb-x" onclick="logout()">✕ Вийти</button>
    </div>
  </div>
  <div class="content">
    <div class="kpis" id="kpis"></div>
    <div class="tools">
      <label>ДАТА:</label>
      <input type="date" id="dp" onchange="byDate()">
      <input type="text" class="tools-search" id="search" placeholder="🔍 Пошук по імені, телефону, адресі…" oninput="searchOrders()">
      <span class="tools-cnt" id="cnt"></span>
    </div>
    <div class="tbl-w">
      <table class="tbl">
        <thead><tr><th>#</th><th>Дата й час</th><th>Ім'я</th><th>Телефон</th><th>Товар</th><th>Адреса</th><th>Коментар</th></tr></thead>
        <tbody id="tb"></tbody>
      </table>
      <div class="tbl-empty" id="te" style="display:none">Замовлень не знайдено</div>
    </div>
  </div>
</div>

<script>
const PWD = 'profit2025';

function login() {
  if (document.getElementById('pwd').value === PWD) {
    document.getElementById('err').textContent = '';
    showDash();
  } else {
    document.getElementById('err').textContent = '❌ Невірний пароль';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

function showDash() {
  document.getElementById('gateWrap').style.display = 'none';
  document.getElementById('dash').classList.add('open');
  showAll();
}

function logout() {
  document.getElementById('dash').classList.remove('open');
  document.getElementById('gateWrap').style.display = '';
  document.getElementById('pwd').value = '';
}

function orders() { return JSON.parse(localStorage.getItem('profit_orders') || '[]'); }

function renderKpis() {
  var all = orders(), tod = new Date().toLocaleDateString('uk-UA');
  var t = all.filter(function(o){ return o.date === tod; });
  var data = [
    [all.length, 'Усього замовлень'],
    [t.length, 'Сьогодні'],
    [t.reduce(function(s,o){return s+(+o.price||0)},0) + '₴', 'Виторг сьогодні'],
    [all.reduce(function(s,o){return s+(+o.price||0)},0) + '₴', 'Загальний виторг']
  ];
  document.getElementById('kpis').innerHTML = data.map(function(d){
    return '<div class="kpi"><div class="kpi-v">'+d[0]+'</div><div class="kpi-l">'+d[1]+'</div></div>';
  }).join('');
}

function renderTbl(arr) {
  var tb = document.getElementById('tb'), te = document.getElementById('te');
  if (!arr.length) { tb.innerHTML = ''; te.style.display = 'block'; return; }
  te.style.display = 'none';
  tb.innerHTML = arr.map(function(o, i) {
    return '<tr>' +
      '<td class="cell-id">' + (arr.length - i) + '</td>' +
      '<td class="cell-dt">' + o.date + '<br>' + o.time + '</td>' +
      '<td><span class="cell-name">' + o.name + '</span></td>' +
      '<td class="cell-phone">' + o.phone + '</td>' +
      '<td class="cell-prod">' + o.product + '<br><span class="cell-price">' + o.price + '₴</span></td>' +
      '<td>' + o.addr + '</td>' +
      '<td class="cell-note">' + (o.note || '—') + '</td>' +
    '</tr>';
  }).join('');
}

function showAll() {
  var arr = orders(); renderKpis(); renderTbl(arr);
  document.getElementById('dp').value = '';
  document.getElementById('search').value = '';
  document.getElementById('cnt').textContent = 'Усього: ' + arr.length;
}

function showToday() {
  var t = new Date().toLocaleDateString('uk-UA');
  var arr = orders().filter(function(o){ return o.date === t; });
  renderKpis(); renderTbl(arr);
  document.getElementById('dp').value = new Date().toISOString().slice(0,10);
  document.getElementById('search').value = '';
  document.getElementById('cnt').textContent = 'Сьогодні: ' + arr.length;
}

function byDate() {
  var r = document.getElementById('dp').value;
  if (!r) { showAll(); return; }
  var parts = r.split('-'), uk = parts[2] + '.' + parts[1] + '.' + parts[0];
  var arr = orders().filter(function(o){ return o.date === uk; });
  renderKpis(); renderTbl(arr);
  document.getElementById('cnt').textContent = 'За ' + uk + ': ' + arr.length;
}

function searchOrders() {
  var q = document.getElementById('search').value.trim().toLowerCase();
  if (!q) { showAll(); return; }
  var arr = orders().filter(function(o) {
    return (o.name && o.name.toLowerCase().indexOf(q) !== -1) ||
           (o.phone && o.phone.indexOf(q) !== -1) ||
           (o.addr && o.addr.toLowerCase().indexOf(q) !== -1) ||
           (o.product && o.product.toLowerCase().indexOf(q) !== -1);
  });
  renderKpis(); renderTbl(arr);
  document.getElementById('cnt').textContent = 'Знайдено: ' + arr.length;
}

function printR() {
  var r = document.getElementById('dp').value, arr, label;
  if (r) {
    var parts = r.split('-'), uk = parts[2] + '.' + parts[1] + '.' + parts[0];
    arr = orders().filter(function(o){ return o.date === uk; }); label = uk;
  } else {
    arr = orders(); label = 'Усі замовлення';
  }
  var w = window.open('', '_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Звіт PROFIT · ' + label + '</title>' +
    '<style>body{font-family:Arial,sans-serif;font-size:13px;padding:24px;max-width:1000px;margin:0 auto}h2{margin:0 0 4px}p{color:#888;font-size:11px;margin:0 0 16px}table{width:100%;border-collapse:collapse}th{background:#2a0f00;color:#e8c96e;padding:8px 10px;text-align:left;font-size:11px;letter-spacing:.08em}td{padding:8px 10px;border-bottom:1px solid #f0e0c0;vertical-align:top}tr:nth-child(even) td{background:#fdf7ee}.sum{margin-top:12px;text-align:right;font-weight:700}@media print{button{display:none}}</style>' +
    '</head><body><h2>☕ PROFIT Coffee Delivery · Звіт</h2>' +
    '<p>' + label + ' · ' + new Date().toLocaleString('uk-UA') + ' · ' + arr.length + ' замовлень</p>' +
    '<button onclick="window.print()" style="margin-bottom:12px;padding:8px 20px;cursor:pointer;background:#2a0f00;color:#e8c96e;border:none;border-radius:6px;font-size:13px">🖨 Друк</button>' +
    '<table><thead><tr><th>#</th><th>Дата й час</th><th>Ім\'я</th><th>Телефон</th><th>Товар</th><th>Адреса</th><th>Коментар</th></tr></thead><tbody>' +
    arr.map(function(o,i){ return '<tr><td>'+(i+1)+'</td><td>'+o.date+' '+o.time+'</td><td>'+o.name+'</td><td>'+o.phone+'</td><td>'+o.product+' · '+o.price+'₴</td><td>'+o.addr+'</td><td>'+(o.note||'—')+'</td></tr>'; }).join('') +
    '</tbody></table><div class="sum">Загальна сума: ' + arr.reduce(function(s,o){return s+(+o.price||0)},0) + ' ₴</div></body></html>');
  w.document.close();
}

function wipe() {
  if (confirm('Видалити ВСІ замовлення?')) { localStorage.removeItem('profit_orders'); showAll(); }
}

/* ── Demo data ── */
var DEMO_NAMES = [

function buildDemo() {
  var arr = [], today = new Date();
  var distribution = [4, 3, 2, 2, 1, 1, 1];
  var idx = 0;
  distribution.forEach(function(count, dayOffset) {
    for (var j = 0; j < count && idx < DEMO_NAMES.length; j++, idx++) {
      var d = new Date(today);
      d.setDate(d.getDate() - dayOffset);
      d.setHours(8 + Math.floor(Math.random() * 11), Math.floor(Math.random() * 60));
      var n = DEMO_NAMES[idx];
      var p = DEMO_PRODS[Math.floor(Math.random() * DEMO_PRODS.length)];
      arr.push({
        id: d.getTime() - idx,
        date: d.toLocaleDateString('uk-UA'),
        time: d.toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'}),
        name: n[0], phone: n[1], addr: n[2], note: n[3],
        product: p[0], price: p[1]
      });
    }
  });
  return arr.sort(function(a,b){ return b.id - a.id; });
}

function openDemo() {
  var cur = orders();
  if (cur.length === 0 || confirm('Завантажити демо-замовлення (≈14 шт.)?\nПоточні дані буде перезаписано.')) {
    localStorage.setItem('profit_orders', JSON.stringify(buildDemo()));
  }
  showDash();
}
