<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web Camera App</title>
  <style>
    /* Стили для элементов интерфейса */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 640px;
    }

    #video {
      width: 100%;
      height: auto;
    }

    #canvas {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="video-container">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
    </div>
    <div>
      <input type="file" accept="video/*" id="upload-input" />
      <button id="upload-button">Загрузить видео</button>
      <button id="capture-button">Сохранить кадр</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
  <script>
    // Обращаемся к элементам на странице
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('canvas');
    const uploadInput = document.getElementById('upload-input');
    const uploadButton = document.getElementById('upload-button');
    const captureButton = document.getElementById('capture-button');

    // Запрашиваем разрешение на доступ к камере и видео
    async function requestCameraAccess() {
      try {
        const constraints = { video: true };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        videoElement.srcObject = stream;
      } catch (error) {
        console.error('Ошибка при получении доступа к камере и видео:', error);
      }
    }

    // Обработчик события для кнопки "Загрузить видео"
    uploadButton.addEventListener('click', () => {
      uploadInput.click();
    });

    // Обработчик события для выбора видеофайла
    uploadInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file) {
        const fileURL = URL.createObjectURL(file);
        videoElement.src = fileURL;
      }
    });

    // Обработчик события для кнопки "Сохранить кадр"
    captureButton.addEventListener('click', () => {
      const canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      const context = canvas.getContext('2d');
      context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

      // Сохранение кадра как изображения
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'frame.png';
      link.click();
    });

    // Обработка кадров видео с использованием модели нейронной сети
    async function processFrames() {
      const model = await bodyPix.load();

      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');

      const videoWidth = videoElement.videoWidth;
      const videoHeight = videoElement.videoHeight;

      canvas.width = videoWidth;
      canvas.height = videoHeight;

      const runInference = async () => {
        context.drawImage(videoElement, 0, 0, videoWidth, videoHeight);
        const segmentation = await model.segmentPerson(videoElement);

        // Обработка результатов сегментации

        requestAnimationFrame(runInference);
      };

      runInference();
    }

    // Запускаем видеопоток и обработку кадров при загрузке страницы
    requestCameraAccess();
    processFrames();
  </script>
</body>
</html>
