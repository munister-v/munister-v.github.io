<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web Camera App</title>
  <style>
    /* Стили для элементов интерфейса */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 640px;
    }

    #video {
      width: 100%;
      height: auto;
    }

    #canvas {
      display: none; /* Скрытие холста по умолчанию */
    }

    .button-container {
      margin-top: 20px;
    }

    #capture-button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    #process-button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="video-container">
      <video id="video" autoplay></video>
      <canvas id="canvas"></canvas>
    </div>
    <div class="button-container">
      <button id="capture-button">Захватить изображение</button>
      <button id="process-button">Обработать изображение</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.8.0/dist/tf.min.js"></script>
  <script>
    // Обращаемся к элементам на странице
    const videoElement = document.getElementById('video');
    const captureButton = document.getElementById('capture-button');
    const processButton = document.getElementById('process-button');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');

    // Переменная для хранения видеопотока
    let stream;

    // Переменная для хранения модели нейронной сети
    let model;

    // Функция для запуска видеопотока с веб-камеры
    async function startVideo() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        videoElement.srcObject = stream;

        // Загрузка предобученной модели MobileNet
        model = await tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/mobilenet_v1_0.25_224/model.json');

        // Обработка каждого кадра видеопотока
        const processFrame = () => {
          const videoWidth = videoElement.videoWidth;
          const videoHeight = videoElement.videoHeight;

          // Установка размеров холста равными размерам видеопотока
          canvas.width = videoWidth;
          canvas.height = videoHeight;

          // Отрисовка текущего кадра на холсте
          context.drawImage(videoElement, 0, 0, videoWidth, videoHeight);

          // Рекурсивный вызов функции для обработки следующего кадра
          requestAnimationFrame(processFrame);
        };

        // Запуск обработки первого кадра
        requestAnimationFrame(processFrame);
      } catch (error) {
        console.error('Ошибка при получении доступа к веб-камере:', error);
      }
    }

    // Функция для остановки видеопотока
    function stopVideo() {
      if (stream) {
        const tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
        videoElement.srcObject = null;
      }
    }

    // Обработчик события для кнопки "Захватить изображение"
    captureButton.addEventListener('click', () => {
      // Отображение холста и захват текущего кадра с холста
      canvas.style.display = 'block';
      context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      console.log('Изображение захвачено!');
    });

    // Обработчик события для кнопки "Обработать изображение"
    processButton.addEventListener('click', async () => {
      // Получение изображения с холста
      const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
      const tensor = tf.browser.fromPixels(imageData).expandDims();

      // Преобразование изображения в тензор и масштабирование значений пикселей
      const imageTensor = tf.cast(tensor, 'float32').div(255);

      // Применение модели MobileNet к изображению
      const predictions = await model.predict(imageTensor);

      // Получение предсказаний классов изображения
      const topPredictions = tf.topk(predictions, 5);
      const classes = topPredictions.indices.dataSync();
      const probabilities = topPredictions.values.dataSync();

      // Загрузка меток классов ImageNet
      const labelsResponse = await fetch('https://storage.googleapis.com/tfjs-models/tfjs/mobilenet_v1_0.25_224/class_names.json');
      const labels = await labelsResponse.json();

      // Отображение результатов классификации на странице
      const resultsContainer = document.createElement('div');
      for (let i = 0; i < classes.length; i++) {
        const className = labels[classes[i]];
        const probability = probabilities[i];

        const resultElement = document.createElement('p');
        resultElement.innerText = `${className}: ${probability.toFixed(3)}`;
        resultsContainer.appendChild(resultElement);
      }

      document.body.appendChild(resultsContainer);

      console.log('Изображение обработано!');
    });

    // Запускаем видеопоток при загрузке страницы
    startVideo();
  </script>
</body>
</html>
