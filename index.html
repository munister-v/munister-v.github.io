<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подписание PDF-документов</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #fileInput {
      margin-bottom: 10px;
    }

    #signButton {
      padding: 10px 20px;
      background-color: #4caf50;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 4px;
    }

    #downloadLink {
      display: none;
      margin-top: 10px;
      text-decoration: none;
      padding: 10px 20px;
      background-color: #2196f3;
      color: white;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Подписание PDF-документов</h1>
  <input type="file" id="fileInput">
  <button id="signButton">Подписать</button>
  <a id="downloadLink">Скачать подписанный файл</a>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.js"></script>
  <script>
    document.getElementById('signButton').addEventListener('click', signPDF);

    async function signPDF() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];

      if (file) {
        const reader = new FileReader();
        reader.onload = async function(event) {
          const arrayBuffer = event.target.result;

          // Вызов функции для подписи PDF-документа
          const signedPDF = await signPDFWithText(arrayBuffer, 'Подпись: Ваше_имя');

          // Создание Blob из подписанного PDF
          const signedPDFBlob = new Blob([signedPDF], { type: 'application/pdf' });

          // Генерация URL для скачивания подписанного файла
          const downloadLink = document.getElementById('downloadLink');
          downloadLink.href = URL.createObjectURL(signedPDFBlob);
          downloadLink.download = 'подписанный_файл.pdf';
          downloadLink.style.display = 'inline-block';
        };
        reader.readAsArrayBuffer(file);
      }
    }

    async function signPDFWithText(arrayBuffer, signatureText) {
      const pdfBytes = new Uint8Array(arrayBuffer);

      // Создание нового PDF-документа
      const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
      const pages = pdfDoc.getPages();

      // Выберите первую страницу для подписи
      const firstPage = pages[0];

      // Создание текстового объекта для подписи
      const signatureObject = pdfDoc.drawText(signatureText)
        .setFont(await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica))
        .setFontSize(12)
        .setX(50)
        .setY(50);

      // Добавление текстового объекта на страницу
      firstPage.addDrawable(signatureObject);

      // Преобразование PDF-документа в массив байтов
      const modifiedPDFBytes = await pdfDoc.save();

      return modifiedPDFBytes;
    }
  </script>
</body>
</html>
