    let frames = []; // Массив для хранения обработанных кадров

    // Запрашиваем разрешение на доступ к камере и видео
    async function requestCameraAccess() {

        const constraints = { video: true };

        videoElement.srcObject = stream;

        console.error('Ошибка при получении доступа к камере и видео:', error);
      }

      dropZone.style.backgroundColor = 'rgba(0, 0, 0, 0.3)';
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.style.backgroundColor = 'transparent';
    });

    dropZone.addEventListener('drop', (event) => {
      event.preventDefault();
      dropZone.style.backgroundColor = 'transparent';

      const file = event.dataTransfer.files[0];
      if (file) {
        const fileURL = URL.createObjectURL(file);
        videoElement.src = fileURL;
      }
    });

    // Обработчик события для загрузки видео через input[type="file"]
    videoUpload.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file) {
        const fileURL = URL.createObjectURL(file);
        videoElement.src = fileURL;
      }
    });

    // Обработка покадровой обработки видео
    async function processFrames() {
      processingStatus.textContent = 'Готово';

      const net = await bodyPix.load();

      const canvas = document.createElement('canvas');
      const canvasContext = canvas.getContext('2d');

      const width = videoElement.videoWidth;
      const height = videoElement.videoHeight;
      canvas.width = width;
      canvas.height = height;

      frames = [];

      for (let i = 0; i < videoElement.duration; i += 1 / videoElement.fps) {
        if (!isProcessing) {
          return;
        }

        videoElement.currentTime = i;

        await new Promise((resolve) => {
          videoElement.onseeked = () => {
            canvasContext.drawImage(videoElement, 0, 0, width, height);

            const frameData = canvas.toDataURL('image/png');
            frames.push(frameData);

            resolve();
          };
        });

        updateProgressBar((i / videoElement.duration) * 100);
      }
    }

    // Обновление прогресс-бара
    function updateProgressBar(progress) {
      progressBar.style.width = `${progress}%`;
    }

    // Обработчик события для кнопки захвата снимка
    captureButton.addEventListener('click', () => {
      frames.forEach((frame, index) => {
        const link = document.createElement('a');
        link.href = frame;
        link.download = `frame_${index + 1}.png`;
        link.click();
      });
    });

    // Обработчик события для кнопки экспорта видео
    exportButton.addEventListener('click', () => {
      if (isExportReady) {
        exportVideo();
      }
    });

    // Функция экспорта видео
    function exportVideo() {
      const blob = new Blob(frames, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);

      const link = document.createElement('a');
      link.href = url;
      link.download = 'processed_video.webm';
      link.click();

      URL.revokeObjectURL(url);
    }

    // Запуск и остановка обработки видео
    function toggleVideoProcessing() {
      if (isProcessing) {
        isProcessing = false;
        captureButton.disabled = false;
        exportButton.disabled = false;
        videoElement.pause();
        processingStatus.textContent = 'Не готово';
      } else {
        isProcessing = true;
        captureButton.disabled = true;
        exportButton.disabled = true;
        videoElement.play();
        processingStatus.textContent = 'Обработка...';
        processFrames();
      }
    }

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Video Processing with ffmpeg.js</title>
  <style>
    /* Стили для элементов интерфейса */
    /* ... */
  </style>
</head>
<body>
  <div class="container">
    <div class="video-container">
      <video id="video" autoplay></video>
    </div>
    <div class="nav-buttons">
      <input type="file" id="video-upload" accept="video/*" />
    </div>
    <div class="output-container">
      <h3>Обработанное видео</h3>
      <video id="output-video" controls></video>
    </div>
    <!-- Дополнительные элементы интерфейса -->
    <!-- ... -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ffmpeg.js/ffmpeg.min.js"></script>
  <script>
    // Обращаемся к элементам на странице
    const videoElement = document.getElementById('video');
    const outputVideo = document.getElementById('output-video');
    const videoUpload = document.getElementById('video-upload');

    // Функция для загрузки видео
    function loadVideo() {
      const file = videoUpload.files[0];
      const reader = new FileReader();
      reader.onload = function(event) {
        const data = new Uint8Array(event.target.result);
        processVideo(data);
      };
      reader.readAsArrayBuffer(file);
    }

    // Функция для обработки видео с помощью ffmpeg.js
    function processVideo(videoData) {
      // Инициализация ffmpeg.js
      const ffmpeg = window.ffmpeg;
      ffmpeg.setLogger(({ type, message }) => console.log(`${type}: ${message}`));
      ffmpeg({
        MEMFS: [{ name: 'input.mp4', data: videoData }],
        arguments: ['-i', 'input.mp4', 'output.mp4'],
      }).then(result => {
        const outputData = result.MEMFS[0].data;
        const outputBlob = new Blob([outputData], { type: 'video/mp4' });
        const outputURL = URL.createObjectURL(outputBlob);
        outputVideo.src = outputURL;
      });
    }

    // Обработчик события для загрузки видео через input[type="file"]
    videoUpload.addEventListener('change', loadVideo);
  </script>
</body>
</html>
