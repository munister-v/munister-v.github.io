<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web Camera App</title>
  <style>
    /* Стили для элементов интерфейса */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 800px;
      height: 100%;
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 640px;
      border: 2px dashed #aaa;
      padding: 20px;
      cursor: pointer;
    }

    .result-container {
      margin-top: 20px;
      width: 100%;
      max-width: 640px;
      border: 2px solid #aaa;
    }

    #video {
      width: 100%;
      height: auto;
    }

    #canvas {
      display: none;
    }

    #result-canvas {
      display: none;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
    }

    .controls input[type="range"] {
      flex-grow: 1;
    }

    .buttons {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .buttons button {
      margin: 0 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="video-container" id="drop-zone">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
    </div>
    <div class="result-container">
      <canvas id="result-canvas"></canvas>
    </div>
    <div class="controls">
      <button id="play-pause-button">Пауза</button>
      <input type="range" id="seek-bar" min="0" value="0" step="0.01">
    </div>
    <div class="buttons">
      <input type="file" accept="video/*" id="upload-input" />
      <button id="upload-button">Загрузить видео</button>
      <button id="capture-button">Сохранить кадр</button>
      <button id="process-button">Обработать кадры</button>
      <button id="save-results-button">Сохранить результаты</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
  <script>
    // Обращаемся к элементам на странице
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('canvas');
    const resultCanvasElement = document.getElementById('result-canvas');
    const uploadInput = document.getElementById('upload-input');
    const uploadButton = document.getElementById('upload-button');
    const captureButton = document.getElementById('capture-button');
    const processButton = document.getElementById('process-button');
    const saveResultsButton = document.getElementById('save-results-button');
    const dropZone = document.getElementById('drop-zone');
    const playPauseButton = document.getElementById('play-pause-button');
    const seekBar = document.getElementById('seek-bar');

    // Запрашиваем разрешение на доступ к камере и видео
    async function requestCameraAccess() {
      try {
        const constraints = { video: true };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        videoElement.srcObject = stream;
      } catch (error) {
        console.error('Ошибка при получении доступа к камере и видео:', error);
      }
    }

    // Обработчик события для кнопки "Загрузить видео"
    uploadButton.addEventListener('click', () => {
      uploadInput.click();
    });

    // Обработчик события для выбора видеофайла
    uploadInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file) {
        const fileURL = URL.createObjectURL(file);
        videoElement.src = fileURL;
      }
    });

    // Обработчик события для кнопки "Сохранить кадр"
    captureButton.addEventListener('click', () => {
      const canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      const context = canvas.getContext('2d');
      context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

      // Сохранение кадра как изображения
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'frame.png';
      link.click();
    });

    // Обработчик события для кнопки "Обработать кадры"
    processButton.addEventListener('click', () => {
      const canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      const context = canvas.getContext('2d');

      const model = await bodyPix.load();
      const frames = [];

      const runInference = async () => {
        context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
        const segmentation = await model.segmentPerson(videoElement);

        // Обработка результатов сегментации

        frames.push(canvas.toDataURL('image/png'));

        if (!videoElement.paused) {
          requestAnimationFrame(runInference);
        }
      };

      runInference();

      videoElement.play();
    });

    // Обработчик события для кнопки "Сохранить результаты"
    saveResultsButton.addEventListener('click', () => {
      const zip = new JSZip();

      frames.forEach((frameData, index) => {
        const imgData = frameData.split(',')[1]; // Извлекаем данные изображения
        const imgBlob = b64toBlob(imgData, 'image/png'); // Преобразуем данные в Blob
        zip.file(`frame_${index}.png`, imgBlob); // Добавляем файл в ZIP-архив
      });

      zip.generateAsync({ type: 'blob' }) // Генерируем ZIP-архив
        .then((content) => {
          const link = document.createElement('a');
          link.href = URL.createObjectURL(content);
          link.download = 'processed_frames.zip';
          link.click();
        });
    });

    // Обработка кадров видео с использованием модели нейронной сети
    async function processFrames() {
      const model = await bodyPix.load();

      const canvas = document.createElement('canvas');
      const resultCanvas = resultCanvasElement;
      const context = canvas.getContext('2d');
      const resultContext = resultCanvas.getContext('2d');

      const videoWidth = videoElement.videoWidth;
      const videoHeight = videoElement.videoHeight;

      canvas.width = videoWidth;
      canvas.height = videoHeight;
      resultCanvas.width = videoWidth;
      resultCanvas.height = videoHeight;

      const runInference = async () => {
        context.drawImage(videoElement, 0, 0, videoWidth, videoHeight);
        const segmentation = await model.segmentPerson(videoElement);

        // Обработка результатов сегментации
        resultContext.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
        resultContext.drawImage(canvas, 0, 0, resultCanvas.width, resultCanvas.height);
        drawContrastPoints(segmentation, resultContext);

        requestAnimationFrame(runInference);
      };

      runInference();
    }

    // Рисование контрастных точек на канвасе
    function drawContrastPoints(segmentation, context) {
      const { width, height, data } = segmentation;
      const threshold = 128;

      for (let i = 0; i < width * height * 4; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        if (Math.abs(r - g) > threshold || Math.abs(r - b) > threshold || Math.abs(g - b) > threshold) {
          const x = (i / 4) % width;
          const y = Math.floor((i / 4) / width);
          context.fillStyle = 'red';
          context.fillRect(x, y, 1, 1);
        }
      }
    }

    // Запускаем видеопоток и обработку кадров при загрузке страницы
    requestCameraAccess();
    processFrames();

    // Обработчик события для перетаскивания файлов на контейнер видео
    dropZone.addEventListener('dragover', (event) => {
      event.preventDefault();
      dropZone.style.backgroundColor = 'rgba(0, 0, 0, 0.3)';
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.style.backgroundColor = 'transparent';
    });

    dropZone.addEventListener('drop', (event) => {
      event.preventDefault();
      dropZone.style.backgroundColor = 'transparent';

      const file = event.dataTransfer.files[0];
      if (file) {
        const fileURL = URL.createObjectURL(file);
        videoElement.src = fileURL;
      }
    });

    // Обработчик события для кнопки "Пауза" и ползунка прокрутки
    playPauseButton.addEventListener('click', () => {
      if (videoElement.paused) {
        videoElement.play();
        playPauseButton.textContent = 'Пауза';
      } else {
        videoElement.pause();
        playPauseButton.textContent = 'Воспроизведение';
      }
    });

    videoElement.addEventListener('timeupdate', () => {
      const currentTime = videoElement.currentTime;
      const duration = videoElement.duration;
      const progress = (currentTime / duration) * 100;
      seekBar.value = progress;
    });

    seekBar.addEventListener('input', () => {
      const progress = seekBar.value;
      const currentTime = (progress / 100) * videoElement.duration;
      videoElement.currentTime = currentTime;
    });

    // Функция преобразования base64 в Blob
    function b64toBlob(b64Data, contentType = '', sliceSize = 512) {
      const byteCharacters = atob(b64Data);
      const byteArrays = [];

      for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {
        const slice = byteCharacters.slice(offset, offset + sliceSize);
        const byteNumbers = new Array(slice.length);

        for (let i = 0; i < slice.length; i++) {
          byteNumbers[i] = slice.charCodeAt(i);
        }

        const byteArray = new Uint8Array(byteNumbers);
        byteArrays.push(byteArray);
      }

      return new Blob(byteArrays, { type: contentType });
    }
  </script>
</body>
</html>
