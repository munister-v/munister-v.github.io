<!DOCTYPE html>
<html>
<head>
  <title>Обнаружение людей на фото (YOLO)</title>
  <style>
    canvas {
      position: absolute;
    }
  </style>
</head>
<body>
  <h1>Обнаружение людей на фото (YOLO)</h1>
  
  <div>
    <label for="upload-input">Выберите фотографию:</label>
    <input id="upload-input" type="file" accept="image/*">
  </div>
  
  <button id="process-button">Обработать фото</button>
  
  <div id="result-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.6.0"></script>
  <script>
    // Загрузка модели YOLO
    async function loadModel() {
      const model = await tf.loadGraphModel('https://github.com/modelhub-ai/yolo-v3/blob/master/contrib_src/model/config.json');
      return model;
    }

    // Обнаружение людей на изображении с помощью YOLO
    async function detectPeople(imageElement, model) {
      const imageTensor = tf.browser.fromPixels(imageElement);
      const expandedImageTensor = imageTensor.expandDims();
      const predictions = await model.predict(expandedImageTensor).array();
      tf.dispose([imageTensor, expandedImageTensor]);
      
      const peoplePredictions = predictions.filter((prediction) => {
        return prediction.class === 'person' && prediction.score > 0.5;
      });
      
      return peoplePredictions;
    }

    // Отрисовка рамок вокруг обнаруженных людей
    function drawBoundingBoxes(imageElement, predictions) {
      const canvas = document.createElement('canvas');
      canvas.width = imageElement.width;
      canvas.height = imageElement.height;
      const context = canvas.getContext('2d');
      
      context.drawImage(imageElement, 0, 0);
      
      context.strokeStyle = 'red';
      context.fillStyle = 'red';
      predictions.forEach((prediction) => {
        const [x, y, width, height] = prediction.bbox;
        context.beginPath();
        context.rect(x, y, width, height);
        context.lineWidth = 2;
        context.stroke();
        context.fillText('Person', x, y > 10 ? y - 5 : 10);
      });

      const resultContainer = document.getElementById('result-container');
      resultContainer.innerHTML = '';
      resultContainer.appendChild(canvas);
    }

    // Обработка загрузки фото
    function handleImageUpload(event) {
      const file = event.target.files[0];
      const reader = new FileReader();

      reader.onload = async function (event) {
        const imageElement = document.createElement('img');
        imageElement.onload = async function () {
          const model = await loadModel();
          const predictions = await detectPeople(imageElement, model);
          drawBoundingBoxes(imageElement, predictions);
        };
        imageElement.src = event.target.result;
      };

      reader.readAsDataURL(file);
    }

    // Привязка обработчика события к кнопке загрузки фото
    const uploadInput = document.getElementById('upload-input');
    uploadInput.addEventListener('change', handleImageUpload);
  </script>
</body>
</html>
