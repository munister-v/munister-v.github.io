<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web Camera App</title>
  <style>
    /* Стили для элементов интерфейса */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 800px;
      height: 100%;
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 640px;
      border: 2px dashed #aaa;
      padding: 20px;
      cursor: pointer;
    }

    #video {
      display: none;
    }

    #canvas {
      width: 100%;
      height: auto;
    }

    /* Дополнительные стили для элементов интерфейса */
    /* ... */

  </style>
</head>
<body>
  <div class="container">
    <div class="video-container" id="drop-zone">
      <video id="video" autoplay playsinline></video>
    </div>
    <!-- Дополнительные элементы интерфейса -->
    <!-- ... -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
  <script>
    // Обращаемся к элементам на странице
    const videoElement = document.getElementById('video');
    const dropZone = document.getElementById('drop-zone');
    const canvasElement = document.getElementById('canvas');

    let frames = []; // Массив для хранения обработанных кадров
    let isProcessing = false; // Флаг, указывающий, выполняется ли обработка кадров

    // Запрашиваем разрешение на доступ к камере и видео
    async function requestCameraAccess() {
      try {
        const constraints = { video: true };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        videoElement.srcObject = stream;
      } catch (error) {
        console.error('Ошибка при получении доступа к камере и видео:', error);
      }
    }

    // Обработчик события для перетаскивания файлов на контейнер видео
    dropZone.addEventListener('dragover', (event) => {
      event.preventDefault();
      dropZone.style.backgroundColor = 'rgba(0, 0, 0, 0.3)';
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.style.backgroundColor = 'transparent';
    });

    dropZone.addEventListener('drop', (event) => {
      event.preventDefault();
      dropZone.style.backgroundColor = 'transparent';

      const file = event.dataTransfer.files[0];
      if (file) {
        const fileURL = URL.createObjectURL(file);
        videoElement.src = fileURL;
      }
    });

    // Обработка покадровой обработки видео
    async function processFrames() {
      const net = await bodyPix.load();

      const canvasContext = canvasElement.getContext('2d');

      const width = videoElement.videoWidth;
      const height = videoElement.videoHeight;
      canvasElement.width = width;
      canvasElement.height = height;

      frames = [];

      while (isProcessing) {
        canvasContext.drawImage(videoElement, 0, 0, width, height);

        const frameData = canvasElement.toDataURL('image/png');
        frames.push(frameData);

        const segmentation = await net.segmentPerson(canvasElement);
        const mask = bodyPix.toMask(segmentation);

        bodyPix.drawMask(canvasElement, videoElement, mask, 0.7, 0, false);

        await new Promise((resolve) => requestAnimationFrame(resolve));
      }
    }

    // Запускаем видеопоток при загрузке страницы
    requestCameraAccess();
  </script>
</body>
</html>
