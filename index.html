<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подписание PDF-документов</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #fileInput {
      margin-bottom: 10px;
    }

    #signButton {
      padding: 10px 20px;
      background-color: #4caf50;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 4px;
    }

    #downloadLink {
      display: none;
      margin-top: 10px;
      text-decoration: none;
      padding: 10px 20px;
      background-color: #2196f3;
      color: white;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Подписание PDF-документов</h1>
  <input type="file" id="fileInput">
  <button id="signButton">Подписать</button>
  <a id="downloadLink" download="подписанный_файл.pdf">Скачать подписанный файл</a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.7.570/pdf.min.js"></script>
  <script>
    document.getElementById('signButton').addEventListener('click', async () => {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];

      if (file) {
        const arrayBuffer = await file.arrayBuffer();

        // Вызов функции для подписи PDF-документа
        const signedPDF = await signPDFWithText(arrayBuffer, 'Подпись: Ваше_имя');

        // Создание Blob из подписанного PDF
        const signedPDFBlob = new Blob([signedPDF], { type: 'application/pdf' });

        // Создание ссылки для скачивания подписанного файла
        const downloadLink = document.getElementById('downloadLink');
        downloadLink.href = URL.createObjectURL(signedPDFBlob);
        downloadLink.style.display = 'inline-block';
      }
    });

    async function signPDFWithText(arrayBuffer, signatureText) {
      const pdfData = new Uint8Array(arrayBuffer);
      const pdf = await pdfjsLib.getDocument(pdfData).promise;
      const page = await pdf.getPage(1); // Подписание первой страницы (нумерация с 1)

      const viewport = page.getViewport({ scale: 1 });

      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const context = canvas.getContext('2d');

      const renderContext = {
        canvasContext: context,
        viewport: viewport,
      };

      await page.render(renderContext).promise;

      context.font = '12px Helvetica';
      context.fillText(signatureText, 50, 50);

      const modifiedPDFData = canvas.toDataURL('image/png');

      return atob(modifiedPDFData.split(',')[1]);
    }
  </script>
</body>
</html>
