document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nd { background: var(--accent); }\n  .flow-arrow {\n    position: absolute; right: -10px; top: 50%; transform: translateY(-50%);\n    font-family: \"Caveat\"; font-size: 28px; color: var(--ink); z-index: 2;\n    background: var(--paper); padding: 0 2px;\n  }\n  .flow-step:last-child .flow-arrow { display: none; }\n\n  /* —— Mobile mockups —— */\n  .mob-wrap { padding: 28px; }\n  .mob-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; align-items: start; }\n  .phone {\n    border: 3px solid var(--ink);\n    border-radius: 28px;\n    padding: 8px;\n    background: var(--ink);\n    box-shadow: 5px 5px 0 var(--ink);\n    aspect-ratio: 9 / 18.5;\n    display: flex; flex-direction: column;\n    position: relative;\n  }\n  .phone::before {\n    content: \"\"; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);\n    width: 60px; height: 6px; background: #555; border-radius: 4px; z-index: 5;\n  }\n  .phone .screen {\n    flex: 1; background: var(--paper); border-radius: 22px;\n    overflow: hidden; display: flex; flex-direction: column;\n    font-size: 12px;\n  }\n  .phone .status {\n    display: flex; justify-content: space-between; padding: 8px 14px 4px;\n    font-family: \"JetBrains Mono\", monospace; font-size: 9px;\n    color: var(--ink); padding-top: 18px;\n  }\n  .phone .mhead {\n    display: flex; justify-content: space-between; align-items: center;\n    padding: 4px 12px 8px; border-bottom: 1.5px solid var(--ink);\n  }\n  .phone .mhead .l { font-family: \"Caveat\"; font-weight: 700; font-size: 16px; display: flex; gap: 4px; align-items: center; }\n  .phone .mhead .l .ring { width: 16px; height: 16px; background: var(--accent); border: 2px solid var(--ink); border-radius: 50%; }\n  .phone .mhead .r { font-size: 11px; }\n  .phone .mbody { flex: 1; overflow: hidden; padding: 8px 10px; display: flex; flex-direction: column; gap: 7px; }\n  .phone .mbody h2 {\n    font-family: \"Kalam\"; font-weight: 700; font-size: 22px;\n    margin ss=\"mono small muted\">КИЇВСЬКЕ ВІДДІЛЕННЯ · з 2015 року<\u002Fdiv>\n      <h1><span class=\"stroke\">Будуємо<\u002Fspan><br>столицю разом<\u002Fh1>\n      <p class=\"sub\">Це не сайт. Це історія київського осередку БУР у чотирьох розділах. Прокручуй.<\u002Fp>\n      <div class=\"row\" style=\"justify-content: center; gap: 14px;\">\n        <span class=\"btn primary\">↓ почати читати<\u002Fspan>\n        <span class=\"btn\">пропустити до дії<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"note\" style=\"bottom: -10px; left: 50%; transform: translateX(-50%) rotate(0);\">scroll ↓<\u002Fdiv>\n    <\u002Fsection>\n\n    <section class=\"chapter\">\n      <div class=\"ix\">I<\u002Fdiv>\n      <div>\n        <div class=\"eyebrow mono\">ХТО МИ<\u002Fdiv>\n        <h2>11 років, одна столиця, тисячі рук.<\u002Fh2>\n        <p>Київський осередок БУР з'явився ще у 2015-му як логічне продовження роботи в Краматорську. Сьогодні — це команда з ~25 координаторів, кілька сотень активних волонтерів і десятки громад-партнерів у Київській області.<\u002Fp>\n        <span class=\"lines mt-12\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ph\">[ photo · команда осередку · group portrait ]<\u002Fdiv>\n    <\u002Fsection>\n\n    <section class=\"quote\">\n      «БУРчик — це найкоротший шлях зробити щось руками й нарешті відчути,<br>\n      що твоє місто — це ти.»\n      <small>— цитата координатора, заглушка<\u002Fsmall>\n    <\u002Fsection>\n\n    <section class=\"chapter\">\n      <div class=\"ix\">II<\u002Fdiv>\n      <div>\n        <div class=\"eyebrow mono\">ЩО МИ РОБИМО<\u002Fdiv>\n        <h2>Дві форми: БУР-табір і БУРчик.<\u002Fh2>\n        <p><strong>БУР-табір<\u002Fstrong> — 7–10 днів спільної роботи, з усієї країни. <strong>БУРчик<\u002Fstrong> — 1–2-денна локальна акція у Києві чи області. І те й те — будівля + молодь + сусіди.<\u002Fp>\n        <div class=\"row mt-12\">\n          <span class=\"pill solid\">38 Б iv class=\"tweaks\" id=\"tweaks\">\n  <h6>Tweaks <button id=\"close-tweaks\">×<\u002Fbutton><\u002Fh6>\n  <div class=\"row\"><span>акцент<\u002Fspan>\n    <div class=\"swatches\">\n      <button class=\"sw active\" data-accent=\"#ff7a1a\" style=\"background:#ff7a1a\"><\u002Fbutton>\n      <button class=\"sw\" data-accent=\"#2a6fdb\" style=\"background:#2a6fdb\"><\u002Fbutton>\n      <button class=\"sw\" data-accent=\"#1f8a5b\" style=\"background:#1f8a5b\"><\u002Fbutton>\n      <button class=\"sw\" data-accent=\"#d23a3a\" style=\"background:#d23a3a\"><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"row\"><span>хайлайтер<\u002Fspan>\n    <div class=\"swatches\">\n      <button class=\"sw active\" data-hi=\"#fff39a\" style=\"background:#fff39a\"><\u002Fbutton>\n      <button class=\"sw\" data-hi=\"#cfe9ff\" style=\"background:#cfe9ff\"><\u002Fbutton>\n      <button class=\"sw\" data-hi=\"#ffd7e8\" style=\"background:#ffd7e8\"><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"row\"><span>щільність сітки<\u002Fspan>\n    <input type=\"range\" id=\"grid-size\" min=\"0\" max=\"40\" step=\"4\" value=\"24\">\n  <\u002Fdiv>\n  <div class=\"row\"><span>сітка<\u002Fspan>\n    <input type=\"checkbox\" id=\"grid-on\" checked=\"\">\n  <\u002Fdiv>\n  <div class=\"row\"><span>колір паперу<\u002Fspan>\n    <div class=\"swatches\">\n      <button class=\"sw active\" data-paper=\"#fbf9f4\" style=\"background:#fbf9f4\"><\u002Fbutton>\n      <button class=\"sw\" data-paper=\"#ffffff\" style=\"background:#ffffff\"><\u002Fbutton>\n      <button class=\"sw\" data-paper=\"#f0ece0\" style=\"background:#f0ece0\"><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // —— Tab switching ——\n  const tabs = document.querySelectorAll('.tab[data-tab]');\n  const variants = document.querySelectorAll('.variant[data-variant]');\n  function showVariant(name) {\n    tabs.forEach(t => t.classList.toggle('is-active', t.dataset.tab === name));\n    variants.forEach(v => v.classList.toggle('is-active', v.dataset.variant === name));\n    window.scrollTo({ top: 0, behavior: 'instant' });\n  }\n  tabs.forEach(t => t.addEventListener('click', () => showVariant(t.dataset.tab)));\n\n  // Keyboard: 1..8 for tabs\n  document.addEventListener('keydown', (e) => {\n    if (e.target.matches('input,textarea')) return;\n    const idx = parseInt(e.key, 10);\n    if (idx >= 1 && idx <= tabs.length) {\n      showVariant(tabs[idx-1].dataset.tab);\n    }\n  });\n\n  // —— Tweaks panel + Edit Mode protocol ——\n  const tweaks = document.getElementById('tweaks');\n  let editOn = false;\n\n  window.addEventListener('message', (e) => {\n    const d = e.data || {};\n    if (d.type === '__activate_edit_mode') { editOn = true; tweaks.classList.add('is-on'); }\n    if (d.type === '__deactivate_edit_mode') { editOn = false; tweaks.classList.remove('is-on'); }\n  });\n  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (_) {}\n\n  document.getElementById('close-tweaks').addEventListener('click', () => {\n    tweaks.classList.remove('is-on');\n    try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (_) {}\n  });\n\n  function setSwatch(group, value, cssVar) {\n    document.documentElement.style.setProperty(cssVar, value);\n    document.querySelectorAll(`.sw[data-${group}]`).forEach(b => {\n      b.classList.toggle('active', b.dataset[group] === value);\n    });\n  }\n  document.querySelectorAll('.sw[data-accent]').forEach(b => b.addEventListener('click', () => setSwatch('accent', b.dataset.accent, '--accent')));\n  document.querySelectorAll('.sw[data-hi]').forEach(b => b.addEventListener('click', () => setSwatch('hi', b.dataset.hi, '--hi')));\n  document.querySelectorAll('.sw[data-paper]').forEach(b => b.addEventListener('click', () => setSwatch('paper', b.dataset.paper, '--paper')));\n\n  document.getElementById('grid-size').addEventListener('input', (e) => {\n    const v = parseInt(e.target.value, 10);\n    document.body.style.backgroundSize = v + 'px ' + v + 'px';\n  });\n  document.getElementById('grid-on').addEventListener('change', (e) => {\n    document.body.style.backgroundImage = e.target.checked\n      ? 'linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px)'\n      : 'none';\n  });\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
