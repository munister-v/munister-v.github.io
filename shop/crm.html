<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Munister CRM — Admin Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap&subset=cyrillic,cyrillic-ext,latin,latin-ext" rel="stylesheet">
<style>
  :root {
    --crm-bg: #f3ecdd;
    --crm-surface: #fbf7ef;
    --crm-panel: #f6efe1;
    --crm-card: #fffaf1;
    --crm-ink: #172117;
    --crm-soft: #66705f;
    --crm-moss: #31432d;
    --crm-amber: #b8521e;
    --crm-gold: #d9b070;
    --crm-plum: #5b2e2c;
    --crm-border: rgba(23,33,23,0.10);
    --crm-shadow: 0 18px 48px rgba(23,33,23,0.08);
    --font-display: "Lora", Georgia, serif;
    --font-body: "Manrope", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(circle at top left, rgba(217,176,112,0.24), transparent 28%),
      linear-gradient(180deg, #f7f1e6 0%, #f1ead9 100%);
    color: var(--crm-ink);
    font-family: var(--font-body);
    overflow-x: hidden;
  }
  body {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  button, input, select { font: inherit; }
  .crm-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 300px minmax(0, 1fr);
  }
  .crm-sidebar {
    background: rgba(22,30,23,0.95);
    color: #f8f0e1;
    padding: 28px 22px;
    position: sticky;
    top: 0;
    height: 100vh;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .crm-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
  }
  .crm-brand-word {
    font-family: var(--font-display);
    font-size: 24px;
    letter-spacing: 0.18em;
    font-weight: 700;
  }
  .crm-brand-note {
    margin-top: 8px;
    color: rgba(248,240,225,0.68);
    font-size: 13px;
    line-height: 1.6;
  }
  .crm-side-section {
    margin-top: 26px;
  }
  .crm-eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .crm-sidebar .crm-eyebrow {
    color: rgba(248,240,225,0.52);
    margin-bottom: 10px;
  }
  .crm-nav {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .crm-nav-btn {
    width: 100%;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: inherit;
    border-radius: 18px;
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    transition: background .2s ease, border-color .2s ease, transform .2s ease;
  }
  .crm-nav-btn.is-active {
    background: rgba(217,176,112,0.14);
    border-color: rgba(217,176,112,0.30);
    transform: translateX(2px);
  }
  .crm-nav-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .crm-nav-body {
    color: rgba(248,240,225,0.68);
    font-size: 12px;
    line-height: 1.5;
  }
  .crm-side-chip-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .crm-side-chip {
    border: 1px solid rgba(255,255,255,0.12);
    padding: 8px 10px;
    border-radius: 999px;
    font-size: 11px;
    color: rgba(248,240,225,0.78);
  }
  .crm-main {
    padding: 28px 30px 46px;
  }
  .crm-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    margin-bottom: 26px;
    flex-wrap: wrap;
  }
  .crm-headline {
    font-family: var(--font-display);
    font-size: clamp(38px, 4vw, 58px);
    line-height: 1;
    letter-spacing: -0.03em;
    margin: 6px 0 0;
    font-weight: 700;
  }
  .crm-head-copy {
    max-width: 720px;
    color: var(--crm-soft);
    font-size: 15px;
    line-height: 1.7;
    margin-top: 14px;
  }
  .crm-toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .crm-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 999px;
    padding: 10px 14px;
    border: 1px solid var(--crm-border);
    background: rgba(255,255,255,0.55);
    font-size: 12px;
    font-weight: 700;
    color: var(--crm-ink);
  }
  .crm-primary {
    border: 0;
    background: var(--crm-ink);
    color: #fff8ef;
  }
  .crm-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-bottom: 24px;
  }
  .crm-stat-card,
  .crm-card {
    background: rgba(255,250,241,0.84);
    border: 1px solid var(--crm-border);
    box-shadow: var(--crm-shadow);
    backdrop-filter: blur(8px);
  }
  .crm-stat-card {
    padding: 20px 22px;
    border-radius: 24px;
  }
  .crm-stat-value {
    font-family: var(--font-display);
    font-size: 38px;
    line-height: 1;
    letter-spacing: -0.03em;
    font-weight: 700;
    margin: 8px 0;
  }
  .crm-stat-meta {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: 12px;
    color: var(--crm-soft);
    font-weight: 700;
  }
  .crm-grid {
    display: grid;
    gap: 18px;
  }
  .crm-grid.two {
    grid-template-columns: 1.3fr 0.9fr;
  }
  .crm-card {
    border-radius: 26px;
    padding: 24px;
  }
  .crm-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .crm-card-title {
    font-family: var(--font-display);
    font-size: clamp(24px, 2.6vw, 34px);
    line-height: 1.08;
    letter-spacing: -0.03em;
    margin: 8px 0 0;
    font-weight: 700;
  }
  .crm-card-body {
    color: var(--crm-soft);
    font-size: 14px;
    line-height: 1.65;
    max-width: 56ch;
  }
  .crm-table {
    width: 100%;
    border-collapse: collapse;
  }
  .crm-table th {
    text-align: left;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--crm-soft);
    padding: 0 0 10px;
    font-weight: 800;
  }
  .crm-table td {
    padding: 14px 0;
    border-top: 1px solid var(--crm-border);
    vertical-align: top;
    font-size: 14px;
  }
  .crm-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 800;
  }
  .crm-badge.shipped { background: rgba(49,67,45,0.12); color: var(--crm-moss); }
  .crm-badge.packed { background: rgba(184,82,30,0.12); color: var(--crm-amber); }
  .crm-badge.hold { background: rgba(91,46,44,0.12); color: var(--crm-plum); }
  .crm-badge.live { background: rgba(217,176,112,0.18); color: #7d5618; }
  .crm-badge.priority { background: rgba(184,82,30,0.14); color: var(--crm-amber); }
  .crm-badge.normal { background: rgba(23,33,23,0.08); color: var(--crm-soft); }
  .crm-stack {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .crm-mini-card {
    background: rgba(255,255,255,0.50);
    border: 1px solid var(--crm-border);
    border-radius: 20px;
    padding: 16px 18px;
  }
  .crm-mini-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
  }
  .crm-mini-title {
    font-size: 15px;
    font-weight: 800;
  }
  .crm-mini-meta {
    color: var(--crm-soft);
    font-size: 12px;
    line-height: 1.5;
  }
  .crm-customer-grid,
  .crm-product-grid,
  .crm-merch-grid,
  .crm-calendar-grid,
  .crm-order-layout,
  .crm-warning-grid,
  .crm-editor-grid,
  .crm-roadmap {
    display: grid;
    gap: 16px;
  }
  .crm-customer-grid { grid-template-columns: repeat(3, 1fr); }
  .crm-product-grid { grid-template-columns: repeat(2, 1fr); }
  .crm-merch-grid { grid-template-columns: repeat(3, 1fr); }
  .crm-calendar-grid { grid-template-columns: repeat(2, 1fr); }
  .crm-order-layout { grid-template-columns: 1.15fr 0.85fr; }
  .crm-warning-grid { grid-template-columns: repeat(2, 1fr); }
  .crm-editor-grid { grid-template-columns: repeat(3, 1fr); }
  .crm-roadmap { grid-template-columns: repeat(3, 1fr); }
  .crm-customer-card,
  .crm-product-card,
  .crm-merch-card,
  .crm-road-col {
    border: 1px solid var(--crm-border);
    border-radius: 22px;
    background: rgba(255,255,255,0.52);
    overflow: hidden;
  }
  .crm-customer-card,
  .crm-product-card,
  .crm-merch-card {
    padding: 18px;
  }
  .crm-customer-name,
  .crm-product-name,
  .crm-merch-name {
    font-family: var(--font-display);
    font-size: 24px;
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin: 4px 0 8px;
    font-weight: 700;
  }
  .crm-kpi-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 14px;
  }
  .crm-kpi-box {
    background: rgba(255,250,241,0.70);
    border: 1px solid var(--crm-border);
    border-radius: 16px;
    padding: 12px;
  }
  .crm-kpi-label {
    color: var(--crm-soft);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 700;
  }
  .crm-kpi-value {
    margin-top: 8px;
    font-size: 19px;
    font-weight: 800;
  }
  .crm-product-top {
    display: grid;
    grid-template-columns: 82px 1fr;
    gap: 14px;
    align-items: center;
    margin-bottom: 14px;
  }
  .crm-thumb {
    width: 82px;
    aspect-ratio: 1/1;
    overflow: hidden;
    border-radius: 18px;
    background: var(--crm-panel);
  }
  .crm-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .crm-meta-line {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 14px;
    color: var(--crm-soft);
    font-size: 12px;
    line-height: 1.5;
  }
  .crm-progress {
    height: 8px;
    border-radius: 999px;
    background: rgba(23,33,23,0.08);
    overflow: hidden;
    margin-top: 12px;
  }
  .crm-progress > span {
    display: block;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--crm-amber), #d68a56);
  }
  .crm-road-col {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .crm-road-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--crm-border);
  }
  .crm-road-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
  }
  .crm-road-note {
    color: var(--crm-soft);
    font-size: 12px;
    font-weight: 700;
  }
  .crm-task {
    background: rgba(255,250,241,0.76);
    border: 1px solid var(--crm-border);
    border-radius: 18px;
    padding: 14px;
  }
  .crm-task-title {
    font-size: 14px;
    font-weight: 800;
    margin: 6px 0 6px;
  }
  .crm-task-body {
    color: var(--crm-soft);
    font-size: 12.5px;
    line-height: 1.6;
  }
  .crm-select {
    width: 100%;
    border: 1px solid var(--crm-border);
    border-radius: 14px;
    background: rgba(255,255,255,0.7);
    padding: 12px 14px;
    color: var(--crm-ink);
    font-size: 13px;
    font-weight: 600;
    outline: none;
  }
  .crm-label {
    display: block;
    margin-bottom: 8px;
    color: var(--crm-soft);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .crm-action-btn {
    border: 1px solid var(--crm-border);
    border-radius: 999px;
    background: rgba(255,255,255,0.58);
    padding: 8px 12px;
    color: var(--crm-ink);
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
  }
  .crm-action-btn.is-active {
    background: var(--crm-ink);
    border-color: var(--crm-ink);
    color: #fff8ef;
  }
  .crm-soft-list {
    margin: 0;
    padding-left: 18px;
    color: var(--crm-soft);
    font-size: 13px;
    line-height: 1.7;
  }
  .crm-checklist {
    display: grid;
    gap: 10px;
  }
  .crm-check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 16px;
    border: 1px solid var(--crm-border);
    background: rgba(255,250,241,0.76);
  }
  .crm-check-dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    margin-top: 5px;
    background: var(--crm-gold);
    flex: 0 0 auto;
  }
  .crm-check-copy {
    font-size: 13px;
    line-height: 1.6;
    color: var(--crm-soft);
  }
  .crm-check-copy strong {
    display: block;
    color: var(--crm-ink);
    font-size: 13px;
    margin-bottom: 2px;
  }
  .crm-row-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .crm-divider {
    height: 1px;
    background: var(--crm-border);
    margin: 18px 0;
  }
  .crm-section {
    display: none;
  }
  .crm-section.is-active {
    display: block;
    animation: crmIn .28s ease both;
  }
  @keyframes crmIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .crm-empty-note {
    color: var(--crm-soft);
    font-size: 13px;
  }
  @media (max-width: 1180px) {
    .crm-shell { grid-template-columns: 1fr; }
    .crm-sidebar {
      position: static;
      height: auto;
      border-right: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .crm-main { padding-top: 22px; }
    .crm-stats { grid-template-columns: repeat(2, 1fr); }
    .crm-grid.two,
    .crm-customer-grid,
    .crm-merch-grid,
    .crm-calendar-grid,
    .crm-order-layout,
    .crm-warning-grid,
    .crm-editor-grid,
    .crm-roadmap {
      grid-template-columns: 1fr;
    }
    .crm-product-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 680px) {
    .crm-main { padding: 20px 16px 32px; }
    .crm-stats { grid-template-columns: 1fr; }
    .crm-card, .crm-stat-card { padding: 18px; border-radius: 20px; }
    .crm-product-top { grid-template-columns: 68px 1fr; }
    .crm-thumb { width: 68px; border-radius: 14px; }
    .crm-kpi-row { grid-template-columns: 1fr; }
  }
</style>
</head>

                    onChange={(event) => {
                      const next = [...seasonalSlotIds];
                      next[idx] = event.target.value;
                      setSeasonalSlotIds(next);
                    }}
                  >
                    {products.map((product) => (
                      <option key={product.id} value={product.id}>{product.name}</option>
                    ))}
                  </select>
                </div>
              ))}
            </div>
          </div>

          <div className="crm-mini-card">
            <div className="crm-eyebrow">Bundle editor</div>
            <label className="crm-label" htmlFor="bundle-select" style={{ marginTop: 14 }}>featured bundle</label>
            <select
              id="bundle-select"
              className="crm-select"
              value={activeBundleId}
              onChange={(event) => setActiveBundleId(event.target.value)}
            >
              {bundlePresets.map((bundle) => (
                <option key={bundle.id} value={bundle.id}>{bundle.title}</option>
              ))}
            </select>
            <div className="crm-mini-card" style={{ background: "rgba(255,250,241,0.62)", marginTop: 14 }}>
              <div className="crm-mini-head">
                <div className="crm-mini-title">{activeBundle.title}</div>
                <span className="crm-badge live">{activeBundle.audience}</span>
              </div>
              <div className="crm-mini-meta">Curated bundle preview for the current storefront merchandising flow.</div>
            </div>
            <div className="crm-stack" style={{ marginTop: 14 }}>
              {activeBundleProducts.map((product) => (
                <div key={product.id} className="crm-mini-card" style={{ background: "rgba(255,250,241,0.62)" }}>
                  <div className="crm-mini-head">
                    <div className="crm-mini-title">{product.name}</div>
                    <span className="crm-badge normal">{product.cat}</span>
                  </div>
                  <div className="crm-mini-meta">{product.note} · {money(product.price)}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function CalendarSection() {
  return (
    <section className="crm-section is-active">
      <div className="crm-card">
        <SectionHeader
          eyebrow="Content operations"
          title="Календар оновлень і продакшну."
          body="Тижневий ритм для storefront-команди: що оновлюємо в merchandising, що дознімаємо і який growth-контент готуємо наступним."
          actions={<span className="crm-pill crm-primary">Open content sprint</span>}
        />
        <div className="crm-calendar-grid">
          {contentCalendar.map((item) => (
            <div key={item.week} className="crm-merch-card">
              <div className="crm-mini-head">
                <div>
                  <div className="crm-eyebrow">{item.week}</div>
                  <div className="crm-merch-name">{item.title}</div>
                </div>
                <span className="crm-badge live">{item.owner}</span>
              </div>
              <div className="crm-card-body">{item.body}</div>
              <div className="crm-stack" style={{ marginTop: 14 }}>
                {item.deliverables.map((deliverable) => (
                  <div key={deliverable} className="crm-mini-card" style={{ background: "rgba(255,250,241,0.62)" }}>
                    <div className="crm-mini-meta">{deliverable}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function RoadmapSection() {
  return (
    <section className="crm-section is-active">
      <div className="crm-card">
        <SectionHeader
          eyebrow="Execution board"
          title="Global roadmap розвитку."
          body="Тут ваш `Must / Should / Later` уже переведён в управляемую доску `P1 / P2 / P3`, чтобы из стратегии сразу переходить в работу команды."
        />
        <div className="crm-roadmap">
          <div className="crm-road-col">
            <div className="crm-road-head">
              <div className="crm-road-title">P1</div>
              <div className="crm-road-note">now</div>
            </div>
            {roadmap.p1.map((task) => (
              <div key={task.title} className="crm-task">
                <span className="crm-badge priority">{task.tag}</span>
                <div className="crm-task-title">{task.title}</div>
                <div className="crm-task-body">{task.body}</div>
              </div>
            ))}
          </div>
          <div className="crm-road-col">
            <div className="crm-road-head">
              <div className="crm-road-title">P2</div>
              <div className="crm-road-note">next</div>
            </div>
            {roadmap.p2.map((task) => (
              <div key={task.title} className="crm-task">
                <span className="crm-badge packed">{task.tag}</span>
                <div className="crm-task-title">{task.title}</div>
                <div className="crm-task-body">{task.body}</div>
              </div>
            ))}
          </div>
          <div className="crm-road-col">
            <div className="crm-road-head">
              <div className="crm-road-title">P3</div>
              <div className="crm-road-note">later</div>
            </div>
            {roadmap.p3.map((task) => (
              <div key={task.title} className="crm-task">
                <span className="crm-badge normal">{task.tag}</span>
                <div className="crm-task-title">{task.title}</div>
                <div className="crm-task-body">{task.body}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

function App() {
  const [active, setActive] = useState("overview");
  const products = useMemo(() => window.MUNISTER.getProducts("uk"), []);
  const copy = useMemo(() => window.MUNISTER.getCopy("uk"), []);
  const categoryCounts = useMemo(() => products.reduce((acc, product) => {
    acc[product.cat] = (acc[product.cat] || 0) + 1;
    return acc;
  }, {}), [products]);
  const lowStock = useMemo(() => products.filter((product) => (stockByProduct[product.id] ?? 0) <= 8), [products]);

  return (
    <div className="crm-shell">
      <Sidebar active={active} setActive={setActive} />
      <main className="crm-main">
        <div className="crm-topbar">
          <div>
            <div className="crm-eyebrow">Munister operations demo</div>
            <h1 className="crm-headline">CRM + admin для storefront-рішення.</h1>
            <div className="crm-head-copy">
              Один екран для операційної команди: замовлення, клієнти, каталог, seasonal-merch та roadmap розвитку. Після аудиту тут залишено тільки ключові робочі модулі без декоративних дублювань.
            </div>
          </div>
          <div className="crm-toolbar">
            <span className="crm-pill">Live catalog: {products.length} SKU</span>
            <span className="crm-pill">Low stock: {lowStock.length}</span>
            <a className="crm-pill" href="index.html" style={{ textDecoration: "none" }}>Open storefront</a>
          </div>
        </div>

        {active === "overview" ? <OverviewSection products={products} lowStock={lowStock} categoryCounts={categoryCounts} /> : null}
        {active === "orders" ? <OrdersSection /> : null}
        {active === "customers" ? <CustomersSection /> : null}
        {active === "catalog" ? <CatalogSection products={products} lowStock={lowStock} /> : null}
        {active === "merch" ? <MerchSection copy={copy} products={products} /> : null}
        {active === "calendar" ? <CalendarSection /> : null}
        {active === "roadmap" ? <RoadmapSection /> : null}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
