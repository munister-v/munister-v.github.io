<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Munister — The Modern Ukrainian Pantry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --olv-bg:          #f7f1e6;
    --olv-surface:     #fffaf2;
    --olv-cream:       #efe3d2;
    --olv-ink:         #233126;
    --olv-ink-soft:    #66705f;
    --olv-moss:        #56664b;
    --olv-amber:       #c86a3c;
    --olv-amber-soft:  rgba(200,106,60,0.12);
    --olv-terra:       #b86a48;
    --olv-light:       #fffdf8;
    --olv-border:      rgba(35,49,38,0.11);
    --olv-border-gold: rgba(200,106,60,0.32);
    --font-display:    'Cormorant Garamond', serif;
    --font-body:       'Manrope', sans-serif;
    --font-label:      'Inter', sans-serif;
    --font-mono:       'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--olv-bg); color: var(--olv-ink); }
  body { font-family: var(--font-body); -webkit-font-smoothing: antialiased; font-weight: 500; }
  a { color: inherit; }
  button, input, select { font-family: inherit; }
  .mn-cat-card:hover .mn-cat-arrow { opacity: 1 !important; }
  .mn-cat-card:hover > div:first-child { transform: scale(1.03); transition: transform .5s ease; }
  .mn-shop-card:hover { border-color: var(--olv-border-gold) !important; }
  @keyframes olv-fadein {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes olv-page-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .olv-page { animation: olv-page-in .4s ease both; }

  @media (max-width: 960px) {
    .olv-desktop-nav { display: none !important; }
    .olv-mobile-toggle { display: flex !important; }
    .olv-hero-grid { grid-template-columns: 1fr !important; }
    .olv-pantry-grid { grid-template-columns: repeat(2,1fr) !important; height: auto !important; }
    .olv-products-grid { grid-template-columns: repeat(2,1fr) !important; }
    .olv-footer-grid { grid-template-columns: 1fr 1fr !important; }
    .olv-founder-grid { grid-template-columns: 1fr !important; }
    .olv-pdp-hero { grid-template-columns: 1fr !important; }
    .olv-journey { grid-template-columns: 1fr 1fr !important; gap: 24px !important; }
    .olv-reviews-grid { grid-template-columns: 1fr !important; }
    .olv-hero-padding { padding: 48px 24px !important; }
  }
  @media (max-width: 640px) {
    .olv-pantry-grid { grid-template-columns: 1fr !important; }
    .olv-products-grid { grid-template-columns: 1fr !important; }
    .olv-footer-grid { grid-template-columns: 1fr !important; }
    .olv-journey { grid-template-columns: 1fr !important; }
  }

  .olv-reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity .6s ease, transform .6s ease;
  }
  .olv-reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="content.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="shop-pdp.jsx"></script>
<script type="text/babel" src="extras.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="search.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function useScrollReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".olv-reveal");
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add("visible");
      });
    }, { threshold: 0.08 });
    els.forEach((el) => obs.observe(el));
    return () => obs.disconnect();
  });
}

function AppHeader({ cartCount, onOpenCart, route, setRoute, onMobileMenu, onSearch, copy, lang, setLang }) {
  const [compact, setCompact] = useState(false);

  useEffect(() => {
    const onScroll = () => setCompact(window.scrollY > 60);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const pad = compact ? "12px 28px" : "18px 28px";
  const logoSize = compact ? 17 : 21;
  const currentPage = typeof route === "object" ? route.page : route;

  return (
    <header style={{
      background: "rgba(247,241,230,0.94)",
      borderBottom: "1px solid var(--olv-border)",
      position: "sticky",
      top: 0,
      zIndex: 50,
      transition: "box-shadow .25s, background .25s",
      boxShadow: compact ? "0 8px 30px rgba(60,48,31,0.08)" : "none",
      backdropFilter: "blur(10px)",
    }}>
      {!compact ? <AnnouncementBar copy={copy} /> : null}
      <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", padding: pad, transition: "padding .25s", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
          <button className="olv-mobile-toggle" onClick={onMobileMenu} style={{ display: "none", background: "transparent", border: 0, cursor: "pointer", color: "var(--olv-ink)", flexDirection: "column", gap: 5, padding: 4 }}>
            <span style={{ width: 22, height: 1.5, background: "currentColor", display: "block" }} />
            <span style={{ width: 16, height: 1.5, background: "currentColor", display: "block" }} />
            <span style={{ width: 22, height: 1.5, background: "currentColor", display: "block" }} />
          </button>
          <nav className="olv-desktop-nav" style={{ display: "flex", gap: 22, fontSize: 12.5, fontFamily: "var(--font-label)", alignItems: "center" }}>
            {[["shop", copy.nav.shop], ["gifts", copy.nav.gifts], ["story", copy.nav.story]].map(([id, label]) => (
              <a key={id} href="#" onClick={(e) => { e.preventDefault(); setRoute(id); }} style={{ color: "var(--olv-ink)", textDecoration: "none", fontWeight: 800, letterSpacing: "0.1em", textTransform: "uppercase", paddingBottom: 4, borderBottom: currentPage === id ? "1px solid var(--olv-amber)" : "1px solid transparent" }}>
                {label}
              </a>
            ))}
          </nav>
        </div>

        <a href="#" onClick={(e) => { e.preventDefault(); setRoute("home"); }} style={{ textDecoration: "none", justifySelf: "center" }}>
          <Logo size={logoSize} />
        </a>

        <div style={{ display: "flex", gap: 14, justifyContent: "flex-end", alignItems: "center", color: "var(--olv-ink)" }}>
          <div className="olv-desktop-nav" style={{ display: "flex", gap: 6 }}>
            {window.MUNISTER.languages.map((entry) => (
              <button
                key={entry.id}
                onClick={() => setLang(entry.id)}
                style={{
                  background: lang === entry.id ? "var(--olv-ink)" : "transparent",
                  color: lang === entry.id ? "var(--olv-surface)" : "var(--olv-ink)",
                  border: "1px solid var(--olv-border)",
                  padding: "7px 10px",
                  borderRadius: 999,
                  fontFamily: "var(--font-label)",
                  fontSize: 10.5,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  fontWeight: 800,
                  cursor: "pointer",
                }}
              >
                {entry.short}
              </button>
            ))}
          </div>
          <button onClick={onSearch} style={{ background: "transparent", border: 0, cursor: "pointer", color: "inherit", padding: 4, display: "inline-flex", gap: 6, alignItems: "center", fontFamily: "var(--font-label)", fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 800 }}>
            <Icon.search /> <span className="olv-desktop-nav">{copy.nav.search}</span>
          </button>
          <button onClick={onOpenCart} style={{ background: "transparent", border: 0, cursor: "pointer", color: "inherit", padding: 4, display: "inline-flex", position: "relative" }}>
            <Icon.bag />
            {cartCount > 0 ? (
              <span style={{ position: "absolute", top: -4, right: -6, background: "var(--olv-moss)", color: "var(--olv-cream)", fontSize: 10, fontWeight: 800, borderRadius: 999, minWidth: 16, height: 16, display: "grid", placeItems: "center", padding: "0 4px" }}>
                {cartCount}
              </span>
            ) : null}
          </button>
        </div>
      </div>
    </header>
  );
}

function App() {
  const [lang, setLang] = useState(window.MUNISTER.defaultLang);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [toast, setToast] = useState("");
  const [route, setRoute] = useState("home");
  const [mobileOpen, setMobileOpen] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);
  const [wishlist, setWishlist] = useState([]);

  const copy = window.MUNISTER.getCopy(lang);
  const products = window.MUNISTER.getProducts(lang);
  const categoryCards = window.MUNISTER.getCategoryCards(lang);
  const money = window.MUNISTER.formatPrice;

  useScrollReveal();

  useEffect(() => {
    document.documentElement.lang = lang;
    document.title = copy.metaTitle;
  }, [lang, copy.metaTitle]);

  useEffect(() => {
    setCart((prev) => prev.map((item) => {
      const next = products.find((p) => p.id === item.id);
      return next ? { ...item, name: next.name, note: next.note, image: next.image, tone: next.tone } : item;
    }));
    setRoute((prev) => {
      if (typeof prev === "object" && prev.page === "pdp" && prev.product) {
        const next = products.find((p) => p.id === prev.product.id);
        return next ? { page: "pdp", product: next } : prev;
      }
      return prev;
    });
  }, [lang]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2400);
  };

  const addToCart = (p, qty = 1) => {
    setCart((prev) => {
      const existing = prev.find((x) => x.id === p.id && x.size === p.size);
      if (existing) return prev.map((x) => x === existing ? { ...x, qty: x.qty + qty } : x);
      return [...prev, { ...p, qty }];
    });
    showToast(`${p.name} · ${copy.toasts.added}`);
  };

  const toggleWish = (id) => {
    setWishlist((w) => w.includes(id) ? w.filter((x) => x !== id) : [...w, id]);
  };

  const navTo = (target) => {
    setRoute(target);
    setMobileOpen(false);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  useEffect(() => {
    const handler = (e) => {
      if (e.key === "/" && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== "INPUT") {
        e.preventDefault();
        setSearchOpen(true);
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const cartCount = cart.reduce((sum, item) => sum + item.qty, 0);
  const currentPage = typeof route === "object" ? route.page : route;

  const renderPage = () => {
    if (currentPage === "shop") {
      return <div className="olv-page"><ShopPage products={products} onAdd={addToCart} setRoute={navTo} copy={copy} money={money} /></div>;
    }
    if (currentPage === "gifts") {
      return <div className="olv-page"><GiftsPage onAdd={addToCart} copy={copy} money={money} /></div>;
    }
    if (currentPage === "story") {
      return <div className="olv-page"><StoryPage copy={copy} /></div>;
    }
    if (currentPage === "pdp" && route.product) {
      return <div className="olv-page"><ProductDetailPage p={route.product} onAdd={addToCart} setRoute={navTo} allProducts={products} copy={copy} money={money} /></div>;
    }
    return (
      <main className="olv-page">
        <Hero copy={copy} onShop={() => navTo("shop")} onGifts={() => navTo("gifts")} />
        <div className="olv-reveal"><PantryGrid copy={copy} cards={categoryCards} onCategory={() => navTo("shop")} /></div>
        <BestSellers products={products} copy={copy} money={money} onAdd={addToCart} onOpen={(p) => navTo({ page: "pdp", product: p })} wishlist={wishlist} toggleWish={toggleWish} />
        <div className="olv-reveal"><FoundersNote copy={copy} /></div>
        <div className="olv-reveal"><Newsletter copy={copy} /></div>
      </main>
    );
  };

  return (
    <div data-screen-label="Munister">
      <AppHeader
        cartCount={cartCount}
        onOpenCart={() => setCartOpen(true)}
        onSearch={() => setSearchOpen(true)}
        route={route}
        setRoute={navTo}
        onMobileMenu={() => setMobileOpen(true)}
        copy={copy}
        lang={lang}
        setLang={setLang}
      />
      {renderPage()}
      <Footer copy={copy} />
      <SearchOverlay products={products} open={searchOpen} onClose={() => setSearchOpen(false)} onProduct={(p) => navTo({ page: "pdp", product: p })} copy={copy} money={money} />
      <MobileNav open={mobileOpen} onClose={() => setMobileOpen(false)} setRoute={navTo} cartCount={cartCount} onOpenCart={() => setCartOpen(true)} copy={copy} lang={lang} setLang={setLang} />
      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} items={cart} setItems={setCart} copy={copy} money={money} />
      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
