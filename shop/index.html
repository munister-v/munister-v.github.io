<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Munister — The Modern Ukrainian Pantry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap&subset=cyrillic,cyrillic-ext,latin,latin-ext" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Manrope:wght@300..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --olv-bg:          #f3ecdd;
    --olv-surface:     #fbf6ec;
    --olv-cream:       #ebdec6;
    --olv-ink:         #1c2a1f;
    --olv-ink-soft:    #5a6553;
    --olv-moss:        #3d5236;
    --olv-moss-deep:   #25351f;
    --olv-amber:       #b8521e;
    --olv-amber-deep:  #8e3d14;
    --olv-amber-soft:  rgba(184,82,30,0.10);
    --olv-terra:       #c25d2c;
    --olv-terra-deep: #7a3a1c;
    --olv-plum:        #5a2a2a;
    --olv-plum-soft:   #b46258;
    --olv-light:       #fffcf3;
    --olv-night:       #161e17;
    --olv-border:      rgba(28,42,31,0.10);
    --olv-border-gold: rgba(184,82,30,0.26);
    --font-display:    'Lora', 'Iowan Old Style', Georgia, serif;
    --font-body:       'Manrope', system-ui, -apple-system, sans-serif;
    --font-label:      'Manrope', system-ui, -apple-system, sans-serif;
    --font-mono:       'JetBrains Mono', 'SF Mono', monospace;

    /* Type scale */
    --text-xs:   0.6875rem;   /* 11px */
    --text-sm:   0.8125rem;   /* 13px */
    --text-base: 0.9375rem;   /* 15px */
    --text-md:   1.0625rem;   /* 17px */
    --text-lg:   1.25rem;     /* 20px */
    --text-xl:   1.5625rem;   /* 25px */
    --text-2xl:  2rem;        /* 32px */
    --text-3xl:  2.75rem;     /* 44px */
    --text-4xl:  3.75rem;     /* 60px */

    --leading-tight:  1.15;
    --leading-snug:   1.35;
    --leading-body:   1.65;
    --leading-loose:  1.85;

    --tracking-tight: -0.02em;
    --tracking-normal: 0;
    --tracking-wide:  0.06em;
    --tracking-wider: 0.12em;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--olv-bg); color: var(--olv-ink); }
  body {
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-weight: 400;
    font-size: var(--text-base);
    line-height: var(--leading-body);
    font-feature-settings: "kern" 1, "liga" 1, "calt" 1;
  }
  a { color: inherit; }
  button, input, select { font-family: inherit; }
  .mn-cat-card:hover .mn-cat-arrow { opacity: 1 !important; }
  .mn-cat-card:hover > div:first-child { transform: scale(1.03); transition: transform .5s ease; }
  .mn-shop-card:hover { border-color: var(--olv-border-gold) !important; }
  @keyframes olv-fadein {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes olv-page-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .olv-page { animation: olv-page-in .4s ease both; }

  @media (max-width: 960px) {
    .olv-desktop-nav { display: none !important; }
    .olv-mobile-toggle { display: flex !important; }
    .olv-hero-grid { grid-template-columns: 1fr !important; min-height: auto !important; }
    .olv-pantry-grid { grid-template-columns: repeat(2,1fr) !important; height: auto !important; }
    .olv-products-grid { grid-template-columns: repeat(2,1fr) !important; gap: 18px !important; }
    .olv-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }
    .olv-founder-grid { grid-template-columns: 1fr !important; }
    .olv-pdp-hero { grid-template-columns: 1fr !important; }
    .olv-journey { grid-template-columns: 1fr 1fr !important; gap: 24px !important; }
    .olv-reviews-grid { grid-template-columns: 1fr !important; }
    .olv-hero-padding { padding: 56px 22px 48px !important; }
    .olv-section-pad { padding-left: 22px !important; padding-right: 22px !important; }
    .olv-color-strip { padding: 56px 22px !important; }
  }
  @media (max-width: 640px) {
    .olv-pantry-grid { grid-template-columns: 1fr !important; }
    .olv-products-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
    .olv-footer-grid { grid-template-columns: 1fr !important; }
    .olv-journey { grid-template-columns: 1fr !important; }
    .olv-hero-padding { padding: 40px 20px 36px !important; }
    .olv-color-strip { padding: 48px 20px !important; }
    .olv-section-pad { padding-left: 20px !important; padding-right: 20px !important; }
    h1 { font-size: clamp(40px, 11vw, 64px) !important; }
    h2 { font-size: clamp(28px, 7vw, 42px) !important; }
    .olv-hero-stats { gap: 22px !important; }
    .olv-hero-card { position: relative !important; inset: auto !important; max-width: 100% !important; margin-top: 22px !important; }
    .olv-hero-img { aspect-ratio: 4/5; height: auto !important; }
    .olv-cart-card { width: 100% !important; }
    .olv-mobile-stack { flex-direction: column !important; align-items: stretch !important; }
    .olv-mobile-stack > * { width: 100% !important; }
  }
  @media (max-width: 420px) {
    h1 { font-size: clamp(36px, 12vw, 56px) !important; line-height: 1.02 !important; }
    .olv-hero-padding { padding: 36px 18px 32px !important; }
  }

  .olv-reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity .6s ease, transform .6s ease;
  }
  .olv-reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Global Typography Refinements ── */
  p, li, span, div {
    text-rendering: optimizeLegibility;
  }

  /* Hero headline – larger, tighter, more editorial */
  h1 {
    font-feature-settings: "kern" 1, "liga" 1, "onum" 1;
    letter-spacing: var(--tracking-tight);
    line-height: var(--leading-tight);
  }

  h2, h3 {
    font-feature-settings: "kern" 1, "liga" 1;
    line-height: var(--leading-snug);
    letter-spacing: -0.025em;
  }

  /* Eyebrow labels – tighter tracking, lighter weight */
  .olv-eyebrow {
    font-family: var(--font-label);
    font-size: var(--text-xs);
    font-weight: 600;
    letter-spacing: var(--tracking-wider);
    text-transform: uppercase;
    color: var(--olv-amber);
  }

  /* Body copy – readable weight and spacing */
  .olv-body {
    font-size: var(--text-base);
    line-height: var(--leading-body);
    font-weight: 400;
    color: var(--olv-ink-soft);
  }

  /* Product card names */
  .olv-card-name {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    line-height: var(--leading-snug);
    letter-spacing: -0.02em;
    font-weight: 600;
  }

  /* Price typography */
  .olv-price {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  /* Button label refinement */
  button {
    font-feature-settings: "kern" 1;
  }

  /* Announcement bar */
  .olv-announce {
    font-size: var(--text-xs);
    letter-spacing: var(--tracking-wide);
    font-weight: 500;
  }

  /* Footer fine print */
  .olv-fine {
    font-size: var(--text-xs);
    letter-spacing: var(--tracking-wide);
    font-weight: 500;
  }

  /* Improve nav link typography */
  nav a {
    font-size: var(--text-xs) !important;
    letter-spacing: var(--tracking-wider) !important;
    font-weight: 700 !important;
  }

  /* Section heading scale override via CSS clamp */
  .olv-section-title {
    font-family: var(--font-display);
    font-size: clamp(2.25rem, 5vw, 3.5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  /* Blockquote – Founder's note */
  blockquote {
    font-style: italic;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.25;
    quotes: "\201C" "\201D";
  }

  /* Input field */
  input[type="email"], input[type="text"] {
    font-size: var(--text-base) !important;
    letter-spacing: 0.01em;
  }

  /* Logo wordmark */
  .olv-logo-text {
    font-family: var(--font-display);
    letter-spacing: 0.22em;
    font-weight: 700;
  }

  /* Product note / subtitle under name */
  .olv-note {
    font-size: var(--text-sm);
    font-weight: 400;
    color: var(--olv-ink-soft);
    letter-spacing: 0.01em;
    font-style: italic;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="content.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="shop-pdp.jsx"></script>
<script type="text/babel" src="extras.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="search.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function useScrollReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".olv-reveal");
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add("visible");
      });
    }, { threshold: 0.08 });
    els.forEach((el) => obs.observe(el));
    return () => obs.disconnect();
  });
}

function AppHeader({ cartCount, onOpenCart, route, setRoute, onMobileMenu, onSearch, copy, lang, setLang }) {
  const [compact, setCompact] = useState(false);

  useEffect(() => {
    const onScroll = () => setCompact(window.scrollY > 60);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const pad = compact ? "12px 28px" : "18px 28px";
  const logoSize = compact ? 17 : 21;
  const currentPage = typeof route === "object" ? route.page : route;

  return (
    <header style={{
      background: "rgba(247,241,230,0.94)",
      borderBottom: "1px solid var(--olv-border)",
      position: "sticky",
      top: 0,
      zIndex: 50,
      transition: "box-shadow .25s, background .25s",
      boxShadow: compact ? "0 8px 30px rgba(60,48,31,0.08)" : "none",
      backdropFilter: "blur(10px)",
    }}>
      {!compact ? <AnnouncementBar copy={copy} /> : null}
      <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", padding: pad, transition: "padding .25s", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 18 }}>
          <button className="olv-mobile-toggle" onClick={onMobileMenu} style={{ display: "none", background: "transparent", border: 0, cursor: "pointer", color: "var(--olv-ink)", flexDirection: "column", gap: 5, padding: 4 }}>
            <span style={{ width: 22, height: 1.5, background: "currentColor", display: "block" }} />
            <span style={{ width: 16, height: 1.5, background: "currentColor", display: "block" }} />
            <span style={{ width: 22, height: 1.5, background: "currentColor", display: "block" }} />
          </button>
          <nav className="olv-desktop-nav" style={{ display: "flex", gap: 22, fontSize: 12.5, fontFamily: "var(--font-label)", alignItems: "center" }}>
            {[["shop", copy.nav.shop], ["gifts", copy.nav.gifts], ["story", copy.nav.story]].map(([id, label]) => (
              <a key={id} href="#" onClick={(e) => { e.preventDefault(); setRoute(id); }} style={{ color: "var(--olv-ink)", textDecoration: "none", fontWeight: 800, letterSpacing: "0.1em", textTransform: "uppercase", paddingBottom: 4, borderBottom: currentPage === id ? "1px solid var(--olv-amber)" : "1px solid transparent" }}>
                {label}
              </a>
            ))}
          </nav>
        </div>

        <a href="#" onClick={(e) => { e.preventDefault(); setRoute("home"); }} style={{ textDecoration: "none", justifySelf: "center" }}>
          <Logo size={logoSize} />
        </a>

        <div style={{ display: "flex", gap: 14, justifyContent: "flex-end", alignItems: "center", color: "var(--olv-ink)" }}>
          <div className="olv-desktop-nav" style={{ display: "flex", gap: 6 }}>
            {window.MUNISTER.languages.map((entry) => (
              <button
                key={entry.id}
                onClick={() => setLang(entry.id)}
                style={{
                  background: lang === entry.id ? "var(--olv-ink)" : "transparent",
                  color: lang === entry.id ? "var(--olv-surface)" : "var(--olv-ink)",
                  border: "1px solid var(--olv-border)",
                  padding: "7px 10px",
                  borderRadius: 999,
                  fontFamily: "var(--font-label)",
                  fontSize: 10.5,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  fontWeight: 800,
                  cursor: "pointer",
                }}
              >
                {entry.short}
              </button>
            ))}
          </div>
          <button onClick={onSearch} style={{ background: "transparent", border: 0, cursor: "pointer", color: "inherit", padding: 4, display: "inline-flex", gap: 6, alignItems: "center", fontFamily: "var(--font-label)", fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 800 }}>
            <Icon.search /> <span className="olv-desktop-nav">{copy.nav.search}</span>
          </button>
          <button onClick={onOpenCart} style={{ background: "transparent", border: 0, cursor: "pointer", color: "inherit", padding: 4, display: "inline-flex", position: "relative" }}>
            <Icon.bag />
            {cartCount > 0 ? (
              <span style={{ position: "absolute", top: -4, right: -6, background: "var(--olv-moss)", color: "var(--olv-cream)", fontSize: 10, fontWeight: 800, borderRadius: 999, minWidth: 16, height: 16, display: "grid", placeItems: "center", padding: "0 4px" }}>
                {cartCount}
              </span>
            ) : null}
          </button>
        </div>
      </div>
    </header>
  );
}

function App() {
  const [lang, setLang] = useState(window.MUNISTER.defaultLang);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [toast, setToast] = useState("");
  const [route, setRoute] = useState("home");
  const [mobileOpen, setMobileOpen] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);
  const [wishlist, setWishlist] = useState([]);

  const copy = window.MUNISTER.getCopy(lang);
  const products = window.MUNISTER.getProducts(lang);
  const categoryCards = window.MUNISTER.getCategoryCards(lang);
  const money = window.MUNISTER.formatPrice;

  useScrollReveal();

  useEffect(() => {
    document.documentElement.lang = lang;
    document.title = copy.metaTitle;
  }, [lang, copy.metaTitle]);

  useEffect(() => {
    setCart((prev) => prev.map((item) => {
      const next = products.find((p) => p.id === item.id);
      return next ? { ...item, name: next.name, note: next.note, image: next.image, tone: next.tone } : item;
    }));
    setRoute((prev) => {
      if (typeof prev === "object" && prev.page === "pdp" && prev.product) {
        const next = products.find((p) => p.id === prev.product.id);
        return next ? { page: "pdp", product: next } : prev;
      }
      return prev;
    });
  }, [lang]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2400);
  };

  const addToCart = (p, qty = 1) => {
    setCart((prev) => {
      const existing = prev.find((x) => x.id === p.id && x.size === p.size);
      if (existing) return prev.map((x) => x === existing ? { ...x, qty: x.qty + qty } : x);
      return [...prev, { ...p, qty }];
    });
    showToast(`${p.name} · ${copy.toasts.added}`);
  };

  const toggleWish = (id) => {
    setWishlist((w) => w.includes(id) ? w.filter((x) => x !== id) : [...w, id]);
  };

  const navTo = (target) => {
    setRoute(target);
    setMobileOpen(false);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  useEffect(() => {
    const handler = (e) => {
      if (e.key === "/" && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== "INPUT") {
        e.preventDefault();
        setSearchOpen(true);
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const cartCount = cart.reduce((sum, item) => sum + item.qty, 0);
  const currentPage = typeof route === "object" ? route.page : route;

  const renderPage = () => {
    if (currentPage === "shop") {
      return <div className="olv-page"><ShopPage products={products} onAdd={addToCart} setRoute={navTo} copy={copy} money={money} /></div>;
    }
    if (currentPage === "gifts") {
      return <div className="olv-page"><GiftsPage onAdd={addToCart} copy={copy} money={money} /></div>;
    }
    if (currentPage === "story") {
      return <div className="olv-page"><StoryPage copy={copy} /></div>;
    }
    if (currentPage === "pdp" && route.product) {
      return <div className="olv-page"><ProductDetailPage p={route.product} onAdd={addToCart} setRoute={navTo} allProducts={products} copy={copy} money={money} /></div>;
    }
    const stripCopy = {
      uk: { eyebrow: "Чесні партії", title: "Малі тиражі. Реальні люди. Український стіл.", body: "Ми не змішуємо мед з різних регіонів, не додаємо ароматизатори в чай, не підфарбовуємо варення. Кожна партія підписана.", cta: "Дивитись усе" },
      en: { eyebrow: "Honest batches", title: "Small runs. Real people. Ukrainian table.", body: "We don't blend honeys across regions, flavour our teas, or tint our preserves. Every batch carries a name.", cta: "Shop everything" },
      it: { eyebrow: "Lotti onesti", title: "Piccole serie. Persone vere. Tavola ucraina.", body: "Non miscoliamo mieli di regioni diverse, non aromatizziamo le tisane, non coloriamo le conserve. Ogni lotto porta una firma.", cta: "Vedi tutto" },
    };
    const sc = stripCopy[lang] || stripCopy.uk;
    const heroImg = window.MUNISTER.assets.honeyJar;
    return (
      <main className="olv-page">
        <Hero copy={copy} onShop={() => navTo("shop")} onGifts={() => navTo("gifts")} />
        <div className="olv-reveal"><PantryGrid copy={copy} cards={categoryCards} onCategory={() => navTo("shop")} /></div>
        <BestSellers products={products} copy={copy} money={money} onAdd={addToCart} onOpen={(p) => navTo({ page: "pdp", product: p })} wishlist={wishlist} toggleWish={toggleWish} />
        <div className="olv-reveal"><ColorStrip tone="moss" eyebrow={sc.eyebrow} title={sc.title} body={sc.body} cta={sc.cta} onClick={() => navTo("shop")} image={heroImg} /></div>
        <div className="olv-reveal"><FoundersNote copy={copy} /></div>
        <div className="olv-reveal"><Newsletter copy={copy} /></div>
      </main>
    );
  };

  return (
    <div data-screen-label="Munister">
      <AppHeader
        cartCount={cartCount}
        onOpenCart={() => setCartOpen(true)}
        onSearch={() => setSearchOpen(true)}
        route={route}
        setRoute={navTo}
        onMobileMenu={() => setMobileOpen(true)}
        copy={copy}
        lang={lang}
        setLang={setLang}
      />
      {renderPage()}
      <Footer copy={copy} />
      <SearchOverlay products={products} open={searchOpen} onClose={() => setSearchOpen(false)} onProduct={(p) => navTo({ page: "pdp", product: p })} copy={copy} money={money} />
      <MobileNav open={mobileOpen} onClose={() => setMobileOpen(false)} setRoute={navTo} cartCount={cartCount} onOpenCart={() => setCartOpen(true)} copy={copy} lang={lang} setLang={setLang} />
      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} items={cart} setItems={setCart} copy={copy} money={money} />
      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
