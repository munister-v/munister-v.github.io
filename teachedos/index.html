<script>
  // Переносим путь/параметры (кроме служебного pwa=1) на новый домен.
  (function () {
    var base = 'https://teached.tech/';
    try {
      var p = window.location.pathname.replace(/^\/teachedos\/?/, '');
      var qs = window.location.search.replace(/[?&]pwa=1\b/, '').replace(/^&/, '?');
      window.location.replace(base + p + qs + window.location.hash);
    } catch (e) {
      window.location.replace(base);
    }
  })();
</script>
